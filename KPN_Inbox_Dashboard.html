<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPN Inbox Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --surface3: #0f1929;
    --border: #1e2d45; --border2: #263548;
    --accent: #3b82f6; --accent2: #06b6d4; --messenger: #1877f2;
    --comment: #10b981; --review: #f59e0b; --text: #e2e8f0;
    --text2: #94a3b8; --text3: #475569; --danger: #ef4444; --success: #10b981;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Sarabun',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow:hidden; }

  /* HEADER */
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 16px; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:9px; font-size:14px; font-weight:700; }
  .logo-icon { width:28px; height:28px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .header-right { display:flex; align-items:center; gap:8px; }
  .hbtn { background:var(--surface2); border:1px solid var(--border); color:var(--text2); padding:5px 11px; border-radius:6px; font-family:'Sarabun',sans-serif; font-size:12px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:5px; }
  .hbtn:hover { background:var(--border); color:var(--text); }
  .notif-wrap { position:relative; }
  .notif-badge { position:absolute; top:-4px; right:-4px; background:var(--danger); color:white; font-size:9px; font-weight:700; width:15px; height:15px; border-radius:50%; display:none; align-items:center; justify-content:center; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--success); animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .last-update { font-size:10px; color:var(--text3); font-family:'IBM Plex Mono',monospace; }

  /* LAYOUT: sidebar | conv-list | chat */
  .layout { display:flex; height:calc(100vh - 52px); }

  /* LEFT SIDEBAR — filter แบรนด์/สาขา */
  .sidebar { width:200px; background:var(--surface); border-right:1px solid var(--border); overflow-y:auto; flex-shrink:0; display:flex; flex-direction:column; }
  .sb-sec { padding:10px 8px; border-bottom:1px solid var(--border); }
  .sb-lbl { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:6px; padding:0 4px; }
  .fb { width:100%; background:transparent; border:none; color:var(--text2); padding:5px 7px; border-radius:5px; font-family:'Sarabun',sans-serif; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; transition:all .15s; text-align:left; }
  .fb:hover,.fb.active { background:var(--surface2); color:var(--text); }
  .fb .cnt { background:var(--border); color:var(--text3); font-size:10px; padding:1px 6px; border-radius:8px; font-family:'IBM Plex Mono',monospace; min-width:20px; text-align:center; }
  .fb.active .cnt { background:var(--accent); color:white; }
  .fl { display:flex; align-items:center; gap:6px; overflow:hidden; min-width:0; }
  .fl span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bd { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .pfl { overflow-y:auto; flex:1; }

  /* STATS BAR */
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border-bottom:1px solid var(--border); flex-shrink:0; }
  .sc { background:var(--surface); padding:8px 12px; }
  .sv { font-size:18px; font-weight:700; font-family:'IBM Plex Mono',monospace; }
  .sl { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; margin-top:1px; }

  /* CONVERSATION LIST — กลาง */
  .conv-panel { width:320px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .conv-toolbar { padding:8px 10px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
  .search-box { background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:6px 12px; color:var(--text); font-family:'Sarabun',sans-serif; font-size:12px; outline:none; width:100%; }
  .search-box:focus { border-color:var(--accent); }
  .search-box::placeholder { color:var(--text3); }
  .type-btns { display:flex; gap:4px; }
  .tb { flex:1; padding:4px 6px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text2); font-family:'Sarabun',sans-serif; font-size:11px; cursor:pointer; transition:all .15s; text-align:center; }
  .tb:hover { background:var(--surface2); color:var(--text); }
  .tb.active { background:var(--accent); border-color:var(--accent); color:white; }
  .tb.tm.active { background:var(--messenger); border-color:var(--messenger); }
  .tb.tc.active { background:var(--comment); border-color:var(--comment); }
  .tb.tr.active { background:var(--review); border-color:var(--review); }
  .conv-count { font-size:10px; color:var(--text3); padding:4px 10px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface); }
  .conv-list { flex:1; overflow-y:auto; }

  /* CONVERSATION ITEM */
  .ci { padding:10px 12px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; display:flex; gap:9px; align-items:flex-start; position:relative; }
  .ci:hover { background:var(--surface2); }
  .ci.active { background:var(--surface2); border-left:3px solid var(--accent); }
  .ci.unread { background:rgba(59,130,246,0.04); }
  .ci.unread .ci-name { font-weight:700; color:var(--text); }
  .ci.unread .ci-preview { color:var(--text2); font-weight:500; }
  .av { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; color:white; position:relative; }
  .av-online { position:absolute; bottom:1px; right:1px; width:10px; height:10px; border-radius:50%; background:var(--success); border:2px solid var(--surface); }
  .ci-body { flex:1; min-width:0; }
  .ci-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
  .ci-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .ci-time { font-size:10px; color:var(--text3); font-family:'IBM Plex Mono',monospace; flex-shrink:0; margin-left:6px; }
  .ci-meta { display:flex; align-items:center; gap:4px; margin-bottom:3px; flex-wrap:wrap; }
  .ci-preview { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .unread-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; margin-left:auto; }
  .tbg { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:700; text-transform:uppercase; flex-shrink:0; }
  .tbg.messenger { background:rgba(24,119,242,.2); color:#60a5fa; }
  .tbg.comment { background:rgba(16,185,129,.2); color:#34d399; }
  .tbg.review { background:rgba(245,158,11,.2); color:#fbbf24; }
  .bbg { font-size:9px; padding:1px 5px; border-radius:3px; font-weight:700; flex-shrink:0; }
  .bbg.thebuilt { background:rgba(59,130,246,.15); color:#60a5fa; }
  .bbg.winwin { background:rgba(245,158,11,.15); color:#fbbf24; }
  .branch-tag { font-size:9px; color:var(--text3); }

  /* STATUS BADGE + DROPDOWN */
  .status-badge { font-size:9px; padding:1px 6px; border-radius:3px; font-weight:700; cursor:pointer; border:none; font-family:'Sarabun',sans-serif; transition:opacity .15s; flex-shrink:0; }
  .status-badge:hover { opacity:.8; }
  .status-badge.new     { background:rgba(59,130,246,.2); color:#60a5fa; }
  .status-badge.follow  { background:rgba(245,158,11,.2); color:#fbbf24; }
  .status-badge.pending { background:rgba(139,92,246,.2); color:#a78bfa; }
  .status-badge.closed  { background:rgba(71,85,105,.25); color:#94a3b8; }
  .status-menu { position:fixed; background:var(--surface); border:1px solid var(--border2); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.5); z-index:500; min-width:130px; overflow:hidden; }
  .status-menu-item { padding:7px 12px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:7px; transition:background .1s; }
  .status-menu-item:hover { background:var(--surface2); }

  .lmbar { padding:8px; text-align:center; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .lmbtn { background:var(--surface2); border:1px solid var(--border); color:var(--text2); padding:5px 16px; border-radius:6px; font-family:'Sarabun',sans-serif; font-size:11px; cursor:pointer; }
  .lmbtn:hover { background:var(--border); color:var(--text); }

  /* CHAT PANEL — ขวา */
  .chat-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
  .chat-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text3); gap:10px; }
  .chat-empty-icon { font-size:48px; opacity:.3; }

  /* CHAT HEADER */
  .chat-header { padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; display:flex; align-items:center; gap:12px; }
  .chat-header-av { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:white; flex-shrink:0; }
  .chat-header-info { flex:1; min-width:0; }
  .chat-header-name { font-size:15px; font-weight:700; }
  .edit-name-btn { background:transparent; border:1px solid var(--border); color:var(--text3); padding:2px 6px; border-radius:4px; cursor:pointer; font-size:11px; margin-left:6px; vertical-align:middle; transition:all 0.2s; }
  .edit-name-btn:hover { background:var(--surface2); color:var(--text); }
  .chat-header-meta { display:flex; align-items:center; gap:6px; margin-top:2px; flex-wrap:wrap; }
  .chat-header-page { font-size:11px; color:var(--text3); }

  /* CHAT MESSAGES */
  .chat-body { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:2px; }
  .day-divider { text-align:center; margin:10px 0; }
  .day-divider span { font-size:10px; color:var(--text3); background:var(--surface2); padding:3px 10px; border-radius:10px; font-family:'IBM Plex Mono',monospace; }
  .msg-row { display:flex; gap:8px; align-items:flex-end; margin-bottom:1px; }
  .msg-row.out { flex-direction:row-reverse; }
  .msg-row.out + .msg-row.out .msg-av,
  .msg-row:not(.out) + .msg-row:not(.out) .msg-av { visibility:hidden; }
  .msg-av { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:white; flex-shrink:0; }
  .msg-bubble-wrap { display:flex; flex-direction:column; max-width:65%; }
  .msg-row.out .msg-bubble-wrap { align-items:flex-end; }
  .msg-sender-label { font-size:10px; color:var(--text3); margin-bottom:2px; padding:0 6px; }
  .msg-bubble { padding:8px 12px; border-radius:18px; font-size:13px; line-height:1.45; word-break:break-word; }
  .msg-bubble.inc { background:var(--surface2); color:var(--text); border-bottom-left-radius:4px; }
  .msg-bubble.out { background:var(--accent); color:white; border-bottom-right-radius:4px; }
  .msg-bubble img { max-width:200px; border-radius:10px; cursor:pointer; display:block; margin-top:4px; }
  .msg-time { font-size:9px; color:var(--text3); margin-top:3px; padding:0 6px; font-family:'IBM Plex Mono',monospace; }
  .msg-row.out .msg-time { text-align:right; }
  .chat-loading { display:flex; align-items:center; justify-content:center; gap:8px; padding:20px; color:var(--text3); font-size:12px; }

  /* REPLY BOX */
  .reply-box { padding:12px 16px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
  .reply-warn { font-size:10px; color:#fbbf24; background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.25); border-radius:5px; padding:5px 9px; margin-bottom:8px; }
  .reply-row { display:flex; gap:8px; align-items:flex-end; }
  .reply-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:8px 14px; color:var(--text); font-family:'Sarabun',sans-serif; font-size:13px; outline:none; resize:none; min-height:38px; max-height:100px; line-height:1.4; }
  .reply-input:focus { border-color:var(--accent); }
  .reply-input::placeholder { color:var(--text3); }
  .send-btn { background:var(--accent); border:none; color:white; width:38px; height:38px; border-radius:50%; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
  .send-btn:hover { background:#2563eb; }
  .send-btn:disabled { opacity:.4; pointer-events:none; }

  /* IMAGE MODAL */
  .im { position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:999; display:none; align-items:center; justify-content:center; }
  .im.show { display:flex; }
  .im img { max-width:90vw; max-height:90vh; border-radius:8px; }
  .imc { position:absolute; top:16px; right:20px; color:white; font-size:26px; cursor:pointer; background:none; border:none; }

  /* NOTIFICATIONS */
  .nc { position:fixed; top:62px; right:16px; z-index:998; display:flex; flex-direction:column; gap:6px; }
  .nt { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:7px; padding:10px 12px; min-width:260px; max-width:300px; animation:slideIn .3s ease; box-shadow:0 4px 20px rgba(0,0,0,.4); cursor:pointer; }
  .nt:hover { background:var(--surface2); }
  .ntitle { font-size:12px; font-weight:600; margin-bottom:2px; }
  .nmsg { font-size:11px; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }

  /* UTILS */
  .sp { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .es { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; color:var(--text3); gap:8px; font-size:12px; }
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-icon">💬</div>KPN Inbox Monitor</div>
  <div class="header-right">
    <span class="last-update" id="lastUpdate">—</span>
    <div class="status-dot"></div>
    <div class="notif-wrap">
      <button class="hbtn" id="notifBtn" onclick="toggleNotif()">🔔 แจ้งเตือน</button>
      <span class="notif-badge" id="notifBadge">0</span>
    </div>
    <button class="hbtn" id="refreshBtn" onclick="loadData(true)">↻ รีเฟรช</button>
  </div>
</div>

<div class="layout">

  <!-- LEFT SIDEBAR: แบรนด์/สาขา -->
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sb-lbl">แบรนด์</div>
      <button class="fb active" onclick="setBrand('all')" id="brand-all"><span class="fl">🏢 ทั้งหมด</span><span class="cnt" id="cb-all">0</span></button>
      <button class="fb" onclick="setBrand('thebuilt')" id="brand-thebuilt"><span class="fl"><span class="bd" style="background:#3b82f6"></span>The Built</span><span class="cnt" id="cb-tb">0</span></button>
      <button class="fb" onclick="setBrand('winwin')" id="brand-winwin"><span class="fl"><span class="bd" style="background:#f59e0b"></span>WIN-WIN</span><span class="cnt" id="cb-ww">0</span></button>
    </div>
    <div class="sb-sec" style="flex:1;display:flex;flex-direction:column;overflow:hidden;border-bottom:none;">
      <div class="sb-lbl">สาขา</div>
      <div class="pfl" id="pfl"><div style="color:var(--text3);font-size:11px;padding:6px">กำลังโหลด...</div></div>
    </div>
  </div>

  <!-- MIDDLE: รายชื่อ conversation -->
  <div class="conv-panel">
    <div class="stats">
      <div class="sc"><div class="sv" id="s0">—</div><div class="sl">Conversations</div></div>
      <div class="sc"><div class="sv" id="s1">—</div><div class="sl">Messenger</div></div>
      <div class="sc"><div class="sv" id="s2">—</div><div class="sl">Comment</div></div>
      <div class="sc"><div class="sv" id="s3">—</div><div class="sl">ยังไม่อ่าน</div></div>
    </div>
    <div class="conv-toolbar">
      <input class="search-box" type="text" placeholder="🔍 ค้นหาชื่อลูกค้า / ข้อความ..." id="searchBox" oninput="filterConvs()">
      <div class="type-btns">
        <button class="tb active" onclick="setType('all')" id="type-all">ทั้งหมด</button>
        <button class="tb tm" onclick="setType('messenger')" id="type-messenger">💬 MSG</button>
        <button class="tb tc" onclick="setType('comment')" id="type-comment">💭 CMT</button>
        <button class="tb tr" onclick="setType('review')" id="type-review">⭐ รีวิว</button>
      </div>
    </div>
    <div class="conv-count" id="convCount">กำลังโหลด...</div>
    <div class="conv-list" id="convList"><div class="chat-loading"><div class="sp"></div>กำลังโหลด...</div></div>
    <div class="lmbar" id="lmbar" style="display:none">
      <button class="lmbtn" onclick="loadMore()">โหลดเพิ่ม ↓</button>
    </div>
  </div>

  <!-- RIGHT: กล่องแชต -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div>เลือก conversation เพื่อดูข้อความ</div>
    </div>
  </div>

</div>

<!-- STATUS DROPDOWN MENU -->
<div class="status-menu" id="statusMenu" style="display:none">
  <div class="status-menu-item" onclick="setConvStatus('new')"><span class="status-badge new">NEW</span> ใหม่</div>
  <div class="status-menu-item" onclick="setConvStatus('follow')"><span class="status-badge follow">FOLLOW</span> ติดตาม</div>
  <div class="status-menu-item" onclick="setConvStatus('pending')"><span class="status-badge pending">PENDING</span> รอดำเนินการ</div>
  <div class="status-menu-item" onclick="setConvStatus('closed')"><span class="status-badge closed">CLOSED</span> ปิดแล้ว</div>
</div>

<div class="im" id="imgModal" onclick="closeImg()">
  <button class="imc" onclick="closeImg()">✕</button>
  <img id="imgSrc" src="" onclick="event.stopPropagation()">
</div>
<div class="nc" id="nc"></div>

<script>
const SB_URL='https://kgjymqajwkhymqcofkhn.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtnanltcWFqd2toeW1xY29ma2huIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDk5NzYsImV4cCI6MjA4OTc4NTk3Nn0._pJLKKt9lGzX7TGs8PxyO5CLdabTXBObk0OeDkxK0hE';

let allMsgs=[], pages=[], conversations=[], filteredConvs=[];
let cBrand='all', cType='all', cPage='all';
let offset=0, pageSize=500, hasMore=false;
let selConvId=null, notifOn=false, newCount=0;
let knownIds=new Set();
let custLabels={}; // key: sender_id+'_'+page_id, value: {custom_name, note}

async function api(tbl, q='', method='GET', body=null){
  const r=await fetch(`${SB_URL}/rest/v1/${tbl}${q}`,{
    method, headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:body?JSON.stringify(body):null
  });
  if(method==='GET') return r.json();
  return r;
}

// โหลดข้อมูลทั้งหมด
async function loadData(isRef=false){
  const btn=document.getElementById('refreshBtn');
  btn.textContent='⏳'; btn.disabled=true;
  try{
    if(isRef||!pages.length) pages=await api('fb_pages','?select=id,name,brand,branch_name&order=brand,branch_name');
    // โหลด customer labels
    const labels=await api('fb_customer_labels','?select=sender_id,page_id,custom_name,note');
    custLabels={};
    (labels||[]).forEach(l=>{ custLabels[l.sender_id+'_'+l.page_id]={custom_name:l.custom_name,note:l.note}; });
    offset=0;
    const msgs=await api('fb_messages',`?select=id,page_id,conversation_id,type,sender_name,sender_id,message,created_at,is_read,conv_status,raw_data&order=created_at.desc&limit=${pageSize}&offset=0`);
    if(isRef&&knownIds.size){
      msgs.filter(x=>!knownIds.has(x.id)).forEach(x=>showNotif(x));
    }
    knownIds=new Set(msgs.map(x=>x.id));
    allMsgs=msgs;
    hasMore=msgs.length===pageSize;
    document.getElementById('lmbar').style.display=hasMore?'block':'none';
    buildConversations();
    renderPageFilter();
    filterConvs();
    updateStats();
    document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('th-TH');
    // ถ้ากำลังเปิด conversation อยู่ — refresh chat ทันที (แต่ไม่ทำลายข้อความที่พิมพ์ค้าง)
    if(selConvId){
      const conv=conversations.find(c=>c.id===selConvId);
      if(conv) safeRenderChat(conv);
    }
  }catch(e){ document.getElementById('convCount').textContent='โหลดไม่สำเร็จ: '+e.message; }
  btn.textContent='↻ รีเฟรช'; btn.disabled=false;
}

async function loadMore(){
  offset+=pageSize;
  const btn=document.querySelector('.lmbtn'); btn.textContent='กำลังโหลด...'; btn.disabled=true;
  const msgs=await api('fb_messages',`?select=id,page_id,conversation_id,type,sender_name,sender_id,message,created_at,is_read,conv_status,raw_data&order=created_at.desc&limit=${pageSize}&offset=${offset}`);
  msgs.forEach(x=>knownIds.add(x.id));
  allMsgs=[...allMsgs,...msgs];
  hasMore=msgs.length===pageSize;
  document.getElementById('lmbar').style.display=hasMore?'block':'none';
  buildConversations();
  filterConvs();
  updateStats();
  btn.textContent='โหลดเพิ่ม ↓'; btn.disabled=false;
}

// สร้าง conversations จาก messages (group by customer sender_id + page_id)
function buildConversations(){
  const convMap={};
  const sorted=[...allMsgs].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  // ตรวจ admin: ถ้า sender_id == page_id ถือเป็น admin (เพจตอบ) ก่อน — กันชื่อหลุด
  const isAdminMsg=(m)=> (m.sender_id && m.page_id && m.sender_id===m.page_id) || isAdminSender(m.sender_name);
  // Pass 1: map conversation_id -> customer_id (เอาจากข้อความลูกค้า)
  const cidToCust={};
  for(const m of sorted){
    if(m.conversation_id && !cidToCust[m.conversation_id] && !isAdminMsg(m) && m.sender_id){
      cidToCust[m.conversation_id]=m.sender_id;
    }
  }
  // Pass 2: build conversations
  for(const msg of sorted){
    let custId='';
    if(isAdminMsg(msg)){
      // admin ตอบ — ลองหา customer_id จากหลายที่:
      // 1) raw_data.recipient_id (Edge Function send-message)
      // 2) raw_data.recipient.id (Facebook webhook echo: is_echo=true)
      // 3) conversation_id mapping (จาก Pass 1)
      custId = msg.raw_data?.recipient_id
            || msg.raw_data?.recipient?.id
            || (msg.conversation_id && cidToCust[msg.conversation_id])
            || '';
    }else{
      custId = msg.sender_id||'';
    }
    const key = custId ? (custId+'_'+msg.page_id) : (msg.conversation_id||msg.id);
    if(!convMap[key]){
      convMap[key]={
        id:key,
        conversation_id:msg.conversation_id,
        page_id:msg.page_id,
        type:msg.type,
        sender_name: isAdminMsg(msg) ? '' : (msg.sender_name||''),
        sender_id: custId,
        messages:[],
        last_msg:null,
        last_time:null,
        unread_count:0,
        conv_status: msg.conv_status||'new',
      };
    }
    if(!isAdminMsg(msg) && !convMap[key].sender_name){
      convMap[key].sender_name = msg.sender_name||'';
      convMap[key].sender_id   = msg.sender_id||custId||'';
    }
    convMap[key].messages.push(msg);
    convMap[key].last_msg=msg;
    convMap[key].last_time=msg.created_at;
    if(!msg.is_read) convMap[key].unread_count++;
    if(msg.conv_status) convMap[key].conv_status=msg.conv_status;
  }
  conversations=Object.values(convMap).sort((a,b)=>new Date(b.last_time)-new Date(a.last_time));
  // ใส่ custom_name/note จาก label ที่พนักงานตั้งไว้
  conversations.forEach(c=>{
    const lk=c.sender_id+'_'+c.page_id;
    const lab=custLabels[lk];
    if(lab){
      c.custom_name=lab.custom_name||'';
      c.custom_note=lab.note||'';
    }
  });
}

function filterConvs(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  filteredConvs=conversations.filter(c=>{
    const p=pages.find(p=>p.id===c.page_id);
    if(cBrand!=='all'&&p?.brand!==cBrand) return false;
    if(cPage!=='all'&&c.page_id!==cPage) return false;
    if(cType!=='all'&&c.type!==cType) return false;
    if(q){
      const nameMatch=(c.sender_name||'').toLowerCase().includes(q);
      const customMatch=((c.custom_name||'')+' '+(c.custom_note||'')).toLowerCase().includes(q);
      const msgMatch=(c.last_msg?.message||'').toLowerCase().includes(q);
      if(!nameMatch&&!customMatch&&!msgMatch) return false;
    }
    return true;
  });
  renderConvList();
  document.getElementById('convCount').textContent=`${filteredConvs.length.toLocaleString()} conversations`;
}

// เปิด conversation
function openConv(convId){
  selConvId=convId;
  // อัปเดต active state
  document.querySelectorAll('.ci').forEach(el=>el.classList.toggle('active',el.dataset.cid===convId));
  const conv=conversations.find(c=>c.id===convId);
  if(!conv) return;
  renderChat(conv);
  // Mark all as read
  const unreadIds=conv.messages.filter(m=>!m.is_read).map(m=>m.id);
  if(unreadIds.length){
    conv.messages.forEach(m=>m.is_read=true);
    conv.unread_count=0;
    document.querySelector(`[data-cid="${CSS.escape(convId)}"]`)?.classList.remove('unread');
    // batch update
    unreadIds.forEach(id=>api('fb_messages',`?id=eq.${id}`,'PATCH',{is_read:true}));
    updateStats();
  }
}

function renderChat(conv){
  const p=pages.find(p=>p.id===conv.page_id);
  const pn=p?.branch_name||p?.name||'—';
  const brand=p?.brand||'thebuilt';
  const bg=brand==='thebuilt'?'linear-gradient(135deg,#3b82f6,#06b6d4)':'linear-gradient(135deg,#f59e0b,#f97316)';
  const dispName = conv.custom_name || conv.sender_name || 'ไม่ทราบชื่อ';
  const ini=(dispName||'?')[0].toUpperCase();
  const canReply=conv.type==='messenger';

  // เรียงข้อความจากเก่าไปใหม่
  const msgs=[...conv.messages].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));

  // สร้าง bubble HTML
  let bubblesH='';
  let lastDay='';
  // Page ID เพื่อแยกว่าข้อความไหน "ของเรา" (admin ตอบ)
  const pageOwnerId=conv.page_id;

  msgs.forEach((msg,i)=>{
    const d=new Date(msg.created_at);
    const dayStr=d.toLocaleDateString('th-TH',{day:'2-digit',month:'long',year:'numeric'});
    if(dayStr!==lastDay){
      bubblesH+=`<div class="day-divider"><span>${dayStr}</span></div>`;
      lastDay=dayStr;
    }

    // ถ้า sender_id == page_id หรือชื่อมี "Built" หรือ "WIN-WIN" = ฝั่ง admin (out)
    const isAdmin=msg.sender_id===pageOwnerId||isAdminSender(msg.sender_name);
    const side=isAdmin?'out':'inc';
    const timeStr=d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});

    // รูปภาพ — รองรับทั้ง Webhook format และ Cron format
    const raw=msg.raw_data||{};
    // Webhook format: raw_data.message.attachments
    const webhookAtts=raw.message?.attachments||[];
    // Cron format: raw_data.attachments.data
    const cronAtts=raw.attachments?.data||[];
    let imgH='';
    webhookAtts.forEach(a=>{
      const u=a.payload?.url;
      if(u) imgH+=`<img src="${u}" onclick="openImg('${u}')" onerror="this.style.display='none'">`;
    });
    cronAtts.forEach(a=>{
      const u=a.image_data?.url||a.file_url;
      if(u) imgH+=`<img src="${u}" onclick="openImg('${u}')" onerror="this.style.display='none'">`;
    });

    // แสดงชื่อถ้าแถวก่อนหน้าต่างคน
    const prev=msgs[i-1];
    const showLabel=!isAdmin&&(!prev||prev.sender_id!==msg.sender_id||(new Date(msg.created_at)-new Date(prev.created_at))>300000);

    bubblesH+=`<div class="msg-row ${side}">
      <div class="msg-av" style="background:${isAdmin?'#374151':bg}">${isAdmin?'📱':esc(ini)}</div>
      <div class="msg-bubble-wrap">
        ${showLabel?`<div class="msg-sender-label">${esc(msg.sender_name||'')}</div>`:''}
        <div class="msg-bubble ${side}">
          ${imgH}
          ${msg.message?`<span>${esc(msg.message)}</span>`:''}
          ${!msg.message&&!imgH?`<span style="opacity:.5;font-style:italic">ไม่มีข้อความ</span>`:''}
        </div>
        <div class="msg-time">${timeStr}</div>
      </div>
    </div>`;
  });

  document.getElementById('chatPanel').innerHTML=`
    <div class="chat-header">
      <div class="chat-header-av" style="background:${bg}">${esc(ini)}</div>
      <div class="chat-header-info">
        <div class="chat-header-name">
          ${esc(dispName)}
          <button class="edit-name-btn" onclick="editCustomName('${esc(conv.id)}')" title="ตั้งชื่อ/บันทึก note">✏️</button>
          ${conv.sender_name && conv.custom_name ? `<span style="font-size:11px;color:var(--text3);margin-left:8px">FB: ${esc(conv.sender_name)}</span>` : ''}
        </div>
        ${conv.custom_note?`<div style="font-size:11px;color:var(--text3);margin-top:2px">📝 ${esc(conv.custom_note)}</div>`:''}
        <div class="chat-header-meta">
          <span class="tbg ${conv.type}">${conv.type}</span>
          <span class="bbg ${brand}">${brand==='thebuilt'?'The Built':'WIN-WIN'}</span>
          <span class="chat-header-page">${esc(pn)}</span>
          <span style="font-size:10px;color:var(--text3)">${conv.messages.length} ข้อความ</span>
        </div>
      </div>
    </div>
    <div class="chat-body" id="chatBody">${bubblesH}</div>
    ${canReply?`
    <div class="reply-box">
      <div class="reply-row">
        <textarea class="reply-input" id="replyInput" placeholder="พิมพ์ข้อความตอบกลับ..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply('${esc(conv.id)}')}"></textarea>
        <button class="send-btn" onclick="sendReply('${esc(conv.id)}')">➤</button>
      </div>
    </div>`:`
    <div style="padding:8px 16px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:var(--surface)">ตอบกลับได้เฉพาะ Messenger</div>`}
  `;
  // scroll ไปล่างสุด
  const body=document.getElementById('chatBody');
  if(body) body.scrollTop=body.scrollHeight;
}

function isAdminSender(name){
  if(!name) return false;
  const n=name.toLowerCase();
  return n.includes('built')||n.includes('win-win')||n.includes('winwin')||n.includes('สาขา');
}

async function sendReply(convId){
  const inp=document.getElementById('replyInput');
  const txt=inp?.value.trim();
  if(!txt) return;
  const conv=conversations.find(c=>c.id===convId);
  const p=pages.find(x=>x.id===conv?.page_id);
  inp.value=''; inp.disabled=true;

  // เพิ่ม bubble ชั่วคราว
  const body=document.getElementById('chatBody');
  const bub=document.createElement('div');
  bub.className='msg-row out';
  bub.innerHTML=`<div class="msg-av" style="background:#374151">📱</div><div class="msg-bubble-wrap"><div class="msg-bubble out">${esc(txt)}</div><div class="msg-time">ส่งแล้ว...</div></div>`;
  body?.appendChild(bub); body?.scrollTo({top:body.scrollHeight,behavior:'smooth'});

  try{
    const sid=conv?.messages.find(m=>!isAdminSender(m.sender_name))?.sender_id;
    if(!sid) throw new Error('ไม่พบ sender_id ของลูกค้า');
    if(!p?.id) throw new Error('ไม่พบ page_id');
    // เรียก Edge Function send-message (ปลอดภัย — token เก็บฝั่ง server)
    const r=await fetch(`${SB_URL}/functions/v1/send-message`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY},
      body:JSON.stringify({page_id:p.id, recipient_id:sid, message:txt})
    });
    const d=await r.json();
    if(!r.ok||d.error) throw new Error(d.error||'ส่งไม่สำเร็จ');
    bub.querySelector('.msg-time').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    bub.querySelector('.msg-bubble').style.background='var(--danger)';
    bub.querySelector('.msg-bubble').textContent='ส่งไม่สำเร็จ: '+e.message;
  }
  inp.disabled=false; inp.focus();
}

function updateStats(){
  const total=filteredConvs.length||conversations.length;
  const msgConvs=conversations.filter(c=>c.type==='messenger').length;
  const cmtConvs=conversations.filter(c=>c.type==='comment').length;
  const unread=conversations.filter(c=>c.unread_count>0).length;
  document.getElementById('s0').textContent=total.toLocaleString();
  document.getElementById('s1').textContent=msgConvs.toLocaleString();
  document.getElementById('s2').textContent=cmtConvs.toLocaleString();
  document.getElementById('s3').textContent=unread.toLocaleString();
  // brand counts (นับ conversations)
  document.getElementById('cb-all').textContent=conversations.length;
  document.getElementById('cb-tb').textContent=conversations.filter(c=>pages.find(p=>p.id===c.page_id)?.brand==='thebuilt').length;
  document.getElementById('cb-ww').textContent=conversations.filter(c=>pages.find(p=>p.id===c.page_id)?.brand==='winwin').length;
}

function fmtTime(iso){
  const d=new Date(iso),n=new Date(),df=n-d;
  if(df<60000) return 'เมื่อกี้';
  if(df<3600000) return Math.floor(df/60000)+' นาที';
  if(df<86400000) return d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
}

let statusMenuConvId=null;
function openStatusMenu(e, convId){
  e.stopPropagation();
  statusMenuConvId=convId;
  const menu=document.getElementById('statusMenu');
  const rect=e.target.getBoundingClientRect();
  menu.style.display='block';
  menu.style.top=(rect.bottom+4)+'px';

function closeStatusMenu(){

async function setConvStatus(status){
  closeStatusMenu();
  if(!statusMenuConvId) return;
  const conv=conversations.find(c=>c.id===statusMenuConvId);
  if(!conv) return;
  // อัปเดต local
  conv.conv_status=status;
  conv.messages.forEach(m=>m.conv_status=status);
  // อัปเดต UI badge ทันที
  const badge=document.querySelector(`[data-cid="${CSS.escape(statusMenuConvId)}"] .status-badge`);
  const stMap={new:'NEW',follow:'FOLLOW',pending:'PENDING',closed:'CLOSED'};
  if(badge){
    badge.className='status-badge '+status;
    badge.textContent=stMap[status]||status.toUpperCase();
  }
  // บันทึก Supabase — update ทุก message ใน conversation นี้
  const ids=conv.messages.map(m=>m.id);
  for(const id of ids){
    await api('fb_messages',`?id=eq.${id}`,'PATCH',{conv_status:status});
  }
}

// ลองดึงชื่อจาก Facebook Graph API ผ่าน Edge Function
async function resolveFbName(convId, btn){
  const conv=conversations.find(c=>c.id===convId);
  if(!conv) return;
  if(!conv.sender_id){ alert('ไม่พบ sender_id ของลูกค้า'); return; }
  const orig=btn?.textContent;
  if(btn){ btn.textContent='⏳'; btn.disabled=true; }
  try{
    const r=await fetch(`${SB_URL}/functions/v1/resolve-customer-name`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'apikey':SB_KEY},
      body:JSON.stringify({page_id:conv.page_id, sender_id:conv.sender_id})
    });
    const d=await r.json();
    if(d.success && d.name){
      // อัปเดต local state แล้ว rerender
      conv.sender_name=d.name;
      conv.messages.forEach(m=>{
        if(m.sender_id===conv.sender_id) m.sender_name=d.name;
      });
      // อัปเดต allMsgs ด้วย เผื่อ rebuild
      allMsgs.forEach(m=>{
        if(m.page_id===conv.page_id && m.sender_id===conv.sender_id) m.sender_name=d.name;
      });
      filterConvs();
      safeRenderChat(conv);
      alert('✅ ดึงชื่อสำเร็จ: '+d.name);
    }else{
      alert('❌ Facebook ไม่ปล่อยข้อมูลของลูกค้าคนนี้\n\nสาเหตุ: '+(d.reason||d.error||'ไม่ทราบ')+'\n\nกรุณาตั้งชื่อเองด้วยปุ่ม ✏️');
    }
  }catch(e){
    alert('ผิดพลาด: '+e.message);
  }finally{
    if(btn){ btn.textContent=orig||'🔄'; btn.disabled=false; }
  }
}

// ตั้ง/แก้ ชื่อลูกค้าที่พนักงานบันทึกเอง
async function editCustomName(convId){
  const conv=conversations.find(c=>c.id===convId);
  if(!conv) return;
  const cur=conv.custom_name||'';
  const curNote=conv.custom_note||'';
  const name=prompt('ตั้งชื่อลูกค้า (เว้นว่าง = ลบชื่อ):', cur);
  if(name===null) return; // กด Cancel
  const note=prompt('หมายเหตุ/เบอร์โทร (ใส่หรือเว้นว่างก็ได้):', curNote);
  if(note===null) return;
  const sid=conv.sender_id;
  const pid=conv.page_id;
  if(!sid){ alert('ไม่พบ sender_id ของลูกค้า'); return; }
  try{
    if(!name.trim() && !note.trim()){
      // ลบ
      await api('fb_customer_labels',`?sender_id=eq.${encodeURIComponent(sid)}&page_id=eq.${encodeURIComponent(pid)}`,'DELETE');
      delete custLabels[sid+'_'+pid];
      conv.custom_name=''; conv.custom_note='';
    }else{
      // upsert
      const r=await fetch(`${SB_URL}/rest/v1/fb_customer_labels?on_conflict=sender_id,page_id`,{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify({sender_id:sid,page_id:pid,custom_name:name.trim(),note:note.trim(),updated_at:new Date().toISOString()})
      });
      if(!r.ok) throw new Error('บันทึกไม่สำเร็จ');
      custLabels[sid+'_'+pid]={custom_name:name.trim(),note:note.trim()};
      conv.custom_name=name.trim();
      conv.custom_note=note.trim();
    }
    // refresh ทั้งสองส่วน
    filterConvs();
    safeRenderChat(conv);
  }catch(e){
    alert('ผิดพลาด: '+e.message);
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// renderChat ที่ไม่ทำลายข้อความที่กำลังพิมพ์อยู่
function safeRenderChat(conv){
  const inp=document.getElementById('replyInput');
  const draft=inp?inp.value:'';
  const cursor=inp?inp.selectionStart:0;
  const wasFocused=(document.activeElement===inp);
  // เก็บตำแหน่ง scroll ของ chat body ด้วย
  const body=document.getElementById('chatBody');
  const scrollTop=body?body.scrollTop:0;
  const scrollAtBottom=body?(body.scrollHeight-body.scrollTop-body.clientHeight<50):true;
  renderChat(conv);
  // คืนข้อความที่พิมพ์ค้างไว้
  const newInp=document.getElementById('replyInput');
  if(newInp&&draft){
    newInp.value=draft;
    if(wasFocused){
      newInp.focus();
      try{ newInp.setSelectionRange(cursor,cursor); }catch(e){}
    }
  }
  // คืนตำแหน่ง scroll (ถ้าผู้ใช้อ่านอยู่กลางๆ ไม่กระโดด)
  const newBody=document.getElementById('chatBody');
  if(newBody){
    if(scrollAtBottom) newBody.scrollTop=newBody.scrollHeight;
    else newBody.scrollTop=scrollTop;
  }
}

// REALTIME — ฟังข้อความใหม่จาก Supabase (เด้งทันที 1-2 วินาที)
let rtChan=null;
function startRealtime(){
  if(rtChan) return;
  // โหลด supabase-js แบบ on-demand
  const s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.onload=()=>{
    const sb=window.supabase.createClient(SB_URL,SB_KEY,{realtime:{params:{eventsPerSecond:10}}});
    rtChan=sb.channel('fb_messages_changes')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'fb_messages'},(payload)=>{
        const m=payload.new;
        if(knownIds.has(m.id)) return;
        knownIds.add(m.id);
        allMsgs=[m,...allMsgs];
        if(!isAdminSender(m.sender_name)) showNotif(m);
        buildConversations();
        renderPageFilter();
        filterConvs();
        updateStats();
        if(selConvId){
          const conv=conversations.find(c=>c.id===selConvId);
          if(conv) safeRenderChat(conv);
        }
        document.getElementById('lastUpdate').textContent=new Date().toLocaleTimeString('th-TH');
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'fb_messages'},(payload)=>{
        // อัปเดต status/is_read ในหน่วยความจำ
        const m=payload.new;
        const idx=allMsgs.findIndex(x=>x.id===m.id);
        if(idx>=0){ allMsgs[idx]=m; }
      })
      .subscribe((status)=>{
        const el=document.getElementById('lastUpdate');
        if(status==='SUBSCRIBED') el.textContent=new Date().toLocaleTimeString('th-TH')+' 🟢';
      });
  };
  document.head.appendChild(s);
}

// SAFETY NET — refresh เต็มทุก 5 นาที เผื่อ realtime หลุด
setInterval(()=>loadData(true), 5*60*1000);

loadData().then(()=>startRealtime());
