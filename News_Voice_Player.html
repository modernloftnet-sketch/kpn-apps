<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A2A4A">
<title>Daily News - The Built</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --color-cream: #F5F3EE;
  --color-cream-dark: #EDE8DD;
  --color-navy: #1A2A4A;
  --color-navy-light: #2A3D5F;
  --color-navy-dark: #0F1A30;
  --color-gold: #C9A961;
  --color-gold-light: #D9BC7B;
  --color-gold-dark: #A88B47;
  --color-text: #2A2A2A;
  --color-text-light: #5A5A5A;
  --color-border: rgba(26, 42, 74, 0.12);
  --shadow-soft: 0 4px 20px rgba(26, 42, 74, 0.08);
  --shadow-medium: 0 8px 32px rgba(26, 42, 74, 0.12);
  --shadow-deep: 0 16px 48px rgba(26, 42, 74, 0.18);
  --font-display: 'Cormorant Garamond', serif;
  --font-thai-display: 'Kanit', sans-serif;
  --font-body: 'Sarabun', sans-serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  background: var(--color-cream);
  color: var(--color-text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at top right, rgba(201, 169, 97, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at bottom left, rgba(26, 42, 74, 0.04) 0%, transparent 50%);
}

/* Decorative pattern */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    repeating-linear-gradient(45deg, transparent, transparent 60px, rgba(26, 42, 74, 0.015) 60px, rgba(26, 42, 74, 0.015) 61px);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 920px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 48px;
  padding-top: 16px;
}

.brand-mark {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 8px 20px;
  background: var(--color-navy);
  color: var(--color-gold);
  border-radius: 999px;
  font-family: var(--font-thai-display);
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.brand-mark::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--color-gold);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

.header h1 {
  font-family: var(--font-display);
  font-size: clamp(48px, 8vw, 84px);
  font-weight: 500;
  font-style: italic;
  color: var(--color-navy);
  line-height: 1;
  letter-spacing: -2px;
  margin-bottom: 8px;
}

.header h1 .accent {
  color: var(--color-gold);
  font-style: normal;
  font-weight: 600;
}

.header .subtitle {
  font-family: var(--font-thai-display);
  font-weight: 400;
  font-size: 16px;
  color: var(--color-text-light);
  letter-spacing: 0.5px;
}

/* Decorative divider */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin: 32px 0;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  max-width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--color-gold) 50%, transparent);
}

.divider .symbol {
  font-family: var(--font-display);
  color: var(--color-gold);
  font-size: 20px;
  letter-spacing: 8px;
}

/* Main player card */
.player-card {
  background: white;
  border-radius: 24px;
  padding: 40px 36px;
  box-shadow: var(--shadow-medium);
  border: 1px solid var(--color-border);
  position: relative;
  overflow: hidden;
  margin-bottom: 32px;
}

.player-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--color-navy) 0%, var(--color-gold) 50%, var(--color-navy) 100%);
}

.player-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}

.date-badge {
  font-family: var(--font-thai-display);
  font-weight: 500;
  font-size: 14px;
  color: var(--color-navy);
  letter-spacing: 0.5px;
}

.date-badge .day {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 600;
  font-style: italic;
  color: var(--color-gold);
  margin-right: 8px;
  vertical-align: middle;
}

.duration-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: var(--color-cream);
  border: 1px solid var(--color-border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--color-text-light);
  font-weight: 500;
}

.player-title {
  font-family: var(--font-thai-display);
  font-weight: 600;
  font-size: 22px;
  color: var(--color-navy);
  line-height: 1.4;
  margin-bottom: 28px;
}

/* Audio player controls */
.audio-controls {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
}

.play-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--color-navy);
  color: var(--color-gold);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 16px rgba(26, 42, 74, 0.3);
  flex-shrink: 0;
}

.play-btn:hover {
  background: var(--color-navy-light);
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(26, 42, 74, 0.4);
}

.play-btn:active {
  transform: scale(0.98);
}

.play-btn svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

.progress-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.progress-bar {
  position: relative;
  height: 6px;
  background: var(--color-cream-dark);
  border-radius: 999px;
  cursor: pointer;
  overflow: hidden;
}

.progress-fill {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--color-navy) 0%, var(--color-gold) 100%);
  border-radius: 999px;
  transition: width 0.1s linear;
}

.progress-handle {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 14px;
  height: 14px;
  background: var(--color-gold);
  border: 2px solid white;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  pointer-events: none;
}

.time-display {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 500;
  color: var(--color-text-light);
  letter-spacing: 0.5px;
  font-variant-numeric: tabular-nums;
}

/* Secondary controls */
.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 1px solid var(--color-border);
  flex-wrap: wrap;
  gap: 12px;
}

.controls-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.control-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: 8px;
  color: var(--color-navy);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.control-btn:hover {
  background: var(--color-cream);
  border-color: var(--color-gold);
}

.control-btn.active {
  background: var(--color-navy);
  color: var(--color-gold);
  border-color: var(--color-navy);
}

.control-btn svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
}

.speed-btn {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 600;
  min-width: 50px;
  justify-content: center;
}

/* Categories cards */
.section-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 500;
  font-style: italic;
  color: var(--color-navy);
  text-align: center;
  margin: 48px 0 24px;
  letter-spacing: -1px;
}

.section-title .accent {
  color: var(--color-gold);
}

.categories-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.category-card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  border: 1px solid var(--color-border);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.category-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-medium);
  border-color: var(--color-gold);
}

.category-icon {
  font-size: 28px;
  margin-bottom: 12px;
  display: inline-block;
}

.category-name {
  font-family: var(--font-thai-display);
  font-weight: 600;
  font-size: 14px;
  color: var(--color-navy);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

.category-text {
  font-size: 14px;
  color: var(--color-text-light);
  line-height: 1.6;
}

/* Insights */
.insights-section {
  background: var(--color-navy);
  color: var(--color-cream);
  padding: 40px 36px;
  border-radius: 24px;
  margin-bottom: 40px;
  position: relative;
  overflow: hidden;
}

.insights-section::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(201, 169, 97, 0.15) 0%, transparent 70%);
  pointer-events: none;
}

.insights-header {
  text-align: center;
  margin-bottom: 28px;
}

.insights-eyebrow {
  font-family: var(--font-thai-display);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--color-gold);
  margin-bottom: 8px;
}

.insights-title {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 500;
  font-style: italic;
  color: var(--color-cream);
  letter-spacing: -1px;
}

.insights-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.insight-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 20px;
  background: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  border-left: 3px solid var(--color-gold);
  transition: all 0.2s ease;
}

.insight-item:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateX(4px);
}

.insight-priority {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.5px;
}

.insight-priority.high {
  background: rgba(220, 38, 38, 0.2);
  color: #FCA5A5;
  border: 1px solid rgba(220, 38, 38, 0.4);
}

.insight-priority.medium {
  background: rgba(245, 158, 11, 0.2);
  color: #FCD34D;
  border: 1px solid rgba(245, 158, 11, 0.4);
}

.insight-priority.low {
  background: rgba(34, 197, 94, 0.2);
  color: #86EFAC;
  border: 1px solid rgba(34, 197, 94, 0.4);
}

.insight-content {
  flex: 1;
}

.insight-action {
  font-family: var(--font-thai-display);
  font-weight: 500;
  font-size: 16px;
  color: var(--color-cream);
  line-height: 1.5;
  margin-bottom: 6px;
}

.insight-target {
  display: inline-block;
  padding: 3px 10px;
  background: rgba(201, 169, 97, 0.15);
  border: 1px solid rgba(201, 169, 97, 0.3);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  color: var(--color-gold-light);
  letter-spacing: 0.5px;
}

/* Full content */
.content-section {
  background: white;
  border-radius: 24px;
  padding: 48px 40px;
  border: 1px solid var(--color-border);
  margin-bottom: 40px;
  position: relative;
}

.content-section::before {
  content: '';
  position: absolute;
  top: 24px;
  left: 24px;
  right: 24px;
  bottom: 24px;
  border: 1px solid var(--color-gold);
  border-radius: 16px;
  pointer-events: none;
  opacity: 0.3;
}

.content-eyebrow {
  text-align: center;
  font-family: var(--font-thai-display);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--color-gold);
  margin-bottom: 8px;
  position: relative;
}

.content-title {
  text-align: center;
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 500;
  font-style: italic;
  color: var(--color-navy);
  margin-bottom: 32px;
  letter-spacing: -1px;
  position: relative;
}

.content-text {
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.9;
  color: var(--color-text);
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
  text-align: justify;
  text-justify: inter-word;
}

.content-text::first-letter {
  font-family: var(--font-display);
  font-size: 64px;
  font-weight: 600;
  font-style: italic;
  color: var(--color-gold);
  float: left;
  line-height: 1;
  margin: 6px 12px 0 0;
}

/* History */
.history-section {
  margin-top: 48px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: white;
  border: 1px solid var(--color-border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.history-item:hover {
  border-color: var(--color-gold);
  transform: translateX(4px);
  box-shadow: var(--shadow-soft);
}

.history-item.active {
  background: var(--color-cream);
  border-color: var(--color-gold);
}

.history-date {
  display: flex;
  align-items: center;
  gap: 16px;
}

.history-date-num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  font-style: italic;
  color: var(--color-gold);
  line-height: 1;
}

.history-date-info {
  display: flex;
  flex-direction: column;
}

.history-date-month {
  font-family: var(--font-thai-display);
  font-size: 13px;
  color: var(--color-navy);
  font-weight: 500;
}

.history-date-year {
  font-size: 11px;
  color: var(--color-text-light);
  letter-spacing: 0.5px;
}

.history-duration {
  font-family: var(--font-display);
  font-size: 13px;
  color: var(--color-text-light);
  font-variant-numeric: tabular-nums;
}

/* Loading & Empty states */
.state-message {
  text-align: center;
  padding: 60px 20px;
  color: var(--color-text-light);
}

.state-message .icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.6;
}

.state-message h3 {
  font-family: var(--font-display);
  font-size: 28px;
  font-style: italic;
  color: var(--color-navy);
  margin-bottom: 8px;
}

.state-message p {
  font-family: var(--font-thai-display);
  font-weight: 400;
  font-size: 14px;
}

.btn-generate {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 20px;
  padding: 12px 28px;
  background: var(--color-navy);
  color: var(--color-gold);
  border: none;
  border-radius: 999px;
  font-family: var(--font-thai-display);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
}

.btn-generate:hover:not(:disabled) {
  background: var(--color-navy-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow-medium);
}

.btn-generate:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(201, 169, 97, 0.3);
  border-top-color: var(--color-gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 64px;
  padding-top: 32px;
  border-top: 1px solid var(--color-border);
  color: var(--color-text-light);
  font-size: 13px;
}

.footer .brand {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 18px;
  color: var(--color-navy);
  margin-bottom: 4px;
}

.footer .tagline {
  font-family: var(--font-thai-display);
  font-weight: 400;
  letter-spacing: 1px;
  color: var(--color-gold);
}

/* Mobile responsive */
@media (max-width: 640px) {
  .app {
    padding: 20px 16px 60px;
  }
  
  .player-card,
  .insights-section,
  .content-section {
    padding: 28px 22px;
    border-radius: 20px;
  }
  
  .header h1 {
    font-size: 56px;
  }
  
  .audio-controls {
    gap: 14px;
  }
  
  .play-btn {
    width: 56px;
    height: 56px;
  }
  
  .controls-row {
    justify-content: center;
  }
  
  .control-btn {
    padding: 6px 10px;
    font-size: 12px;
  }
  
  .content-text {
    font-size: 15px;
  }
  
  .content-text::first-letter {
    font-size: 48px;
  }
  
  .insights-title,
  .content-title,
  .section-title {
    font-size: 28px;
  }
}

/* Animation on load */
.fade-in {
  animation: fadeInUp 0.6s ease-out backwards;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.fade-in:nth-child(1) { animation-delay: 0.1s; }
.fade-in:nth-child(2) { animation-delay: 0.2s; }
.fade-in:nth-child(3) { animation-delay: 0.3s; }
.fade-in:nth-child(4) { animation-delay: 0.4s; }
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header class="header fade-in">
  <div class="brand-mark">
    The Built In Company
  </div>
  <h1>Daily <span class="accent">News</span></h1>
  <p class="subtitle">ข่าวประจำวัน สำหรับคุณกรกต</p>
  <div class="divider">
    <span class="symbol">✦ ✦ ✦</span>
  </div>
</header>

<!-- Main content area -->
<div id="content"></div>

<!-- Footer -->
<footer class="footer">
  <div class="brand">The Built In Company</div>
  <div class="tagline">สวย ทน หรูหรา ราคาไม่เวอร์</div>
</footer>

</div>

<script>
// ========== Configuration ==========
// ⚠️ แก้ตรงนี้: ใส่ Publishable Key หรือ Anon Key ของคุณ
// หาได้จาก Supabase → Settings → API Keys
// รองรับทั้ง 2 แบบ:
//   - Publishable Key รุ่นใหม่ (เริ่มด้วย "sb_publishable_...")

  furniture: { icon: '🛋️', name: 'เฟอร์นิเจอร์ & ตกแต่งภายใน' },

// ========== State ==========
let currentNews = null;
let allNews = [];
let audioElement = null;
let isPlaying = false;
let currentSpeed = 1.0;

// ========== Utility functions ==========
function formatThaiDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getDate()} ${THAI_MONTHS[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== Data fetching ==========
async function fetchAllNews() {
  const { data, error } = await supabaseClient
    .from('daily_news')
    .select('*')
    .eq('status', 'ready')
    .order('news_date', { ascending: false })
    .limit(30);
  
  if (error) {
    console.error('Error fetching news:', error);
    return [];
  }
  return data || [];
}

async function generateTodayNews() {
  const btn = document.getElementById('generate-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> กำลังสร้างข่าว...';
  }
  
  try {
    const response = await fetch(`${SUPABASE_URL}/functions/v1/generate-daily-news`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`
      },
      body: JSON.stringify({})
    });
    
    // Wait then reload
    await new Promise(r => setTimeout(r, 90000));
    location.reload();
  } catch (err) {
    console.error('Generation error:', err);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '🔄 ลองใหม่';
    }
  }
}

// ========== Render functions ==========
function renderEmpty() {
  return `
    <div class="state-message">
      <div class="icon">📰</div>
      <h3>ยังไม่มีข่าววันนี้</h3>
      <p>กดปุ่มด้านล่างเพื่อสร้างข่าวประจำวัน (ใช้เวลาประมาณ 1-2 นาที)</p>
      <button class="btn-generate" id="generate-btn" onclick="generateTodayNews()">
        ✨ สร้างข่าววันนี้
      </button>
    </div>
  `;
}

  const dateObj = new Date(news.news_date);

  const monthName = THAI_MONTHS[dateObj.getMonth()];
  const yearBE = dateObj.getFullYear() + 543;
  
  return `
    <div class="player-card fade-in">
      <div class="player-meta">
        <div class="date-badge">
          <span class="day">${dayNum}</span>
          ${monthName} ${yearBE}
        </div>
        <div class="duration-badge">
          ⏱ ${formatTime(news.audio_duration_sec)} • ${news.char_count?.toLocaleString() || 0} ตัวอักษร
        </div>
      </div>
      
      <h2 class="player-title">${escapeHtml(news.title)}</h2>
      
      <div class="audio-controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        
        <div class="progress-section">
          <div class="progress-bar" id="progress-bar" onclick="seek(event)">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-handle" id="progress-handle" style="left: 0%"></div>
          </div>
          <div class="time-display">

            <span id="total-time">${formatTime(news.audio_duration_sec)}</span>
          </div>
        </div>
      </div>
      
      <div class="controls-row">
        <div class="controls-group">
          <button class="control-btn" onclick="skip(-10)" title="ย้อน 10 วิ">
            <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
            10s
          </button>
          <button class="control-btn" onclick="skip(10)" title="เลื่อน 10 วิ">
            10s
            <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
          </button>
        </div>
        
        <div class="controls-group">
          <button class="control-btn speed-btn" id="speed-btn" onclick="changeSpeed()">
            ${currentSpeed}x
          </button>
          <a class="control-btn" href="${news.audio_url}" download="news-${news.news_date}.mp3" title="ดาวน์โหลด">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>

function renderCategories(categories) {
  if (!categories || Object.keys(categories).length === 0) return '';
  
  const cards = Object.entries(CATEGORY_INFO).map(([key, info]) => {
    const text = categories[key];
    if (!text) return '';
    return `
      <div class="category-card">
        <div class="category-icon">${info.icon}</div>
        <div class="category-name">${info.name}</div>
        <div class="category-text">${escapeHtml(text)}</div>
      </div>
    `;
  }).filter(Boolean).join('');
  
  if (!cards) return '';
  
  return `
    <h2 class="section-title">สรุป<span class="accent">ตามหมวด</span></h2>
    <div class="categories-grid fade-in">${cards}</div>
  `;
}

function renderInsights(insights) {
  if (!insights || insights.length === 0) return '';
  
  const items = insights.map(ins => {
    const priority = ins.priority || 'medium';
    const priorityLabel = priority === 'high' ? 'HIGH' : priority === 'medium' ? 'MED' : 'LOW';
    return `
      <div class="insight-item">
        <div class="insight-priority ${priority}">${priorityLabel}</div>
        <div class="insight-content">
          <div class="insight-action">${escapeHtml(ins.action)}</div>
          ${ins.target ? `<div class="insight-target">→ ${escapeHtml(ins.target)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  
  return `
    <div class="insights-section fade-in">
      <div class="insights-header">
        <div class="insights-eyebrow">Action Items</div>
        <h2 class="insights-title">วันนี้<em>ต้องทำ</em></h2>
      </div>
      <div class="insights-list">${items}</div>
    </div>
  `;
}

function renderContent(news) {
  return `
    <div class="content-section fade-in">
      <div class="content-eyebrow">Full Transcript</div>
      <h2 class="content-title">เนื้อหา<em>ฉบับเต็ม</em></h2>
      <div class="content-text">${escapeHtml(news.summary_text)}</div>
    </div>
  `;
}

function renderHistory(newsList, currentId) {
  const others = newsList.filter(n => n.id !== currentId).slice(0, 7);
  if (others.length === 0) return '';
  
  const items = others.map(n => {
    const d = new Date(n.news_date);
    return `
      <div class="history-item" onclick="selectNews('${n.id}')">
        <div class="history-date">
          <div class="history-date-num">${d.getDate()}</div>
          <div class="history-date-info">
            <div class="history-date-month">${THAI_MONTHS_SHORT[d.getMonth()]}</div>
            <div class="history-date-year">${d.getFullYear() + 543}</div>
          </div>
        </div>
        <div class="history-duration">${formatTime(n.audio_duration_sec)}</div>
      </div>
    `;
  }).join('');
  
  return `
    <div class="history-section fade-in">
      <h2 class="section-title">ประวัติ<span class="accent">ย้อนหลัง</span></h2>
      <div class="history-list">${items}</div>
    </div>
  `;
}

function render() {
  const content = document.getElementById('content');
  
  if (!currentNews) {
    content.innerHTML = renderEmpty();
    return;
  }
  
  content.innerHTML = 
    renderPlayer(currentNews) +
    renderCategories(currentNews.categories) +
    renderInsights(currentNews.insights) +
    renderContent(currentNews) +
    renderHistory(allNews, currentNews.id);
  
  // Initialize audio element
  setupAudio();
}

// ========== Audio control ==========
function setupAudio() {
  audioElement = document.getElementById('audio-player');
  if (!audioElement) return;
  
  audioElement.playbackRate = currentSpeed;
  
  audioElement.addEventListener('timeupdate', updateProgress);
  audioElement.addEventListener('ended', () => {
    isPlaying = false;
    updatePlayButton();
  });
  audioElement.addEventListener('loadedmetadata', () => {
    document.getElementById('total-time').textContent = formatTime(audioElement.duration);
  });
}

function togglePlay() {
  if (!audioElement) return;
  
  if (isPlaying) {
    audioElement.pause();
  } else {
    audioElement.play();
  }
  isPlaying = !isPlaying;
  updatePlayButton();
}

function updatePlayButton() {
  const icon = document.getElementById('play-icon');
  if (!icon) return;
  
  if (isPlaying) {
    icon.innerHTML = '<path d="M6 4h4v16H6zm8 0h4v16h-4z"/>';
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

function updateProgress() {
  if (!audioElement || !audioElement.duration) return;
  
  const percent = (audioElement.currentTime / audioElement.duration) * 100;
  document.getElementById('progress-fill').style.width = percent + '%';
  document.getElementById('progress-handle').style.left = percent + '%';
  document.getElementById('current-time').textContent = formatTime(audioElement.currentTime);
}

function seek(event) {
  if (!audioElement) return;
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const percent = (event.clientX - rect.left) / rect.width;
  audioElement.currentTime = audioElement.duration * percent;
}

function skip(seconds) {
  if (!audioElement) return;
  audioElement.currentTime = Math.max(0, Math.min(audioElement.duration, audioElement.currentTime + seconds));
}

function changeSpeed() {
  const speeds = [1.0, 1.25, 1.5, 1.75, 2.0, 0.75];
  const idx = speeds.indexOf(currentSpeed);
  currentSpeed = speeds[(idx + 1) % speeds.length];
  
  if (audioElement) audioElement.playbackRate = currentSpeed;
  document.getElementById('speed-btn').textContent = currentSpeed + 'x';
}

function selectNews(id) {
  const news = allNews.find(n => n.id === id);
  if (!news) return;
  
  if (audioElement) {
    audioElement.pause();
    isPlaying = false;
  }
  
  currentNews = news;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========== Initialize ==========
async function init() {
  document.getElementById('content').innerHTML = `
    <div class="state-message">
      <div class="spinner" style="margin: 0 auto 20px; width: 32px; height: 32px;"></div>
      <p>กำลังโหลดข่าว...</p>
    </div>
  `;
  
  allNews = await fetchAllNews();
  
  if (allNews.length > 0) {
    currentNews = allNews[0];
  }
  
  render();
}

init();
</script>
