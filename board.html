<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPN Board — ติดตามงาน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0f2744;
  --navy2: #1a3a5c;
  --gold: #c9a84c;
  --gold2: #f0c96a;
  --cream: #faf7f2;
  --white: #ffffff;
  --gray: #8a8a9a;
  --border: #e2ddd6;
  --shadow: 0 2px 12px rgba(15,39,68,0.10);
  --shadow-card: 0 2px 8px rgba(15,39,68,0.08);

  --col-new:      #e8f4fd; --col-new-h:    #1a6fa8; --col-new-t: #1a3a5c;
  --col-deposit:  #fef9e7; --col-deposit-h:#c9a84c; --col-deposit-t:#7a5c00;
  --col-making:   #fdf2e9; --col-making-h: #e67e22; --col-making-t:#7d3c0a;
  --col-install:  #eaf4fb; --col-install-h:#2980b9; --col-install-t:#1a4d6e;
  --col-collect:  #fdf5f0; --col-collect-h:#c0392b; --col-collect-t:#7b241c;
  --col-done:     #eafaf1; --col-done-h:   #1a6b3c; --col-done-t:  #0d3d21;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: #f0ece4;
  min-height: 100vh;
  overflow-x: auto;
}

/* ─── HEADER ─── */
.header {
  background: var(--navy);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header-logo { font-family: 'Kanit', sans-serif; font-size: 18px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.header-sub { font-size: 12px; color: rgba(255,255,255,0.4); }
.header-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.12); }
.header-title { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.btn-add-card {
  background: var(--gold); color: var(--navy); border: none; border-radius: 8px;
  padding: 7px 16px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'Sarabun', sans-serif; display: flex; align-items: center; gap: 6px;
  transition: background 0.2s;
}
.btn-add-card:hover { background: var(--gold2); }
#syncBadge { font-size: 11px; color: rgba(255,255,255,0.5); }

/* ─── BOARD ─── */
.board-wrap { padding: 20px 24px 40px; display: flex; gap: 14px; min-width: max-content; }

/* ─── COLUMN ─── */
.column {
  width: 240px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: rgba(255,255,255,0.6);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.col-header {
  padding: 12px 14px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.col-title {
  font-family: 'Kanit', sans-serif;
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.col-dot { width: 10px; height: 10px; border-radius: 50%; }
.col-count {
  background: rgba(0,0,0,0.08); border-radius: 20px;
  padding: 1px 8px; font-size: 11px; font-weight: 700;
}
.col-body {
  flex: 1; padding: 6px 10px 10px;
  display: flex; flex-direction: column; gap: 8px;
  min-height: 80px;
  transition: background 0.15s;
}
.col-body.drag-over { background: rgba(201,168,76,0.1); border-radius: 8px; }

/* ─── CARD ─── */
.card {
  background: var(--white);
  border-radius: 10px;
  padding: 12px 12px 10px;
  cursor: grab;
  box-shadow: var(--shadow-card);
  border: 1.5px solid transparent;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  position: relative;
  user-select: none;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15,39,68,0.14); border-color: var(--gold); }
.card.dragging { opacity: 0.4; transform: rotate(2deg); }
.card-title { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; line-height: 1.4; }
.card-customer { font-size: 12px; color: var(--gray); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.card-amount { font-size: 13px; font-weight: 700; color: var(--gold); }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.card-date { font-size: 11px; color: var(--gray); }
.card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.card:hover .card-actions { opacity: 1; }
.card-btn { background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 13px; }
.card-btn:hover { background: var(--border); }
.card-tag {
  display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 20px; margin-bottom: 6px;
}

/* ─── ADD CARD BUTTON ─── */
.col-add-btn {
  margin: 4px 10px 10px;
  padding: 8px;
  background: none; border: 1.5px dashed var(--border);
  border-radius: 8px; cursor: pointer; color: var(--gray);
  font-size: 12px; font-family: 'Sarabun', sans-serif;
  transition: all 0.15s;
}
.col-add-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.05); }

/* ─── MODAL ─── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,39,68,0.5); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--white); border-radius: 16px;
  width: 100%; max-width: 480px; max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(15,39,68,0.25);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity:0; transform:translateY(16px) scale(0.97); } to { opacity:1; transform:none; } }
.modal-header {
  padding: 20px 24px 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.modal-title { font-family: 'Kanit', sans-serif; font-size: 17px; font-weight: 600; color: var(--navy); }
.modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--gray); padding: 4px 8px; border-radius: 6px; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--navy); }
.form-group input, .form-group select, .form-group textarea {
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 9px 12px; font-size: 13px; font-family: 'Sarabun', sans-serif;
  color: var(--navy); background: var(--cream);
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--gold); background: white;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif; transition: all 0.15s; }
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: var(--navy2); }
.btn-outline { background: white; color: var(--navy); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--navy); }
.btn-danger { background: #fdf0f0; color: #8b1a1a; border: 1.5px solid #f5c6c6; }
.btn-danger:hover { background: #f5c6c6; }

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--navy); color: white; border-radius: 10px;
  padding: 12px 20px; font-size: 13px;
  transform: translateY(80px); opacity: 0;
  transition: all 0.3s; z-index: 999;
  border-left: 4px solid var(--gold);
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ─── DETAIL PANEL ─── */
.card-detail {
  background: white; border-radius: 10px; padding: 14px;
  border: 1.5px solid var(--border);
}
.detail-label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.detail-value { font-size: 14px; color: var(--navy); font-weight: 500; }

/* ─── STATS BAR ─── */
.stats-bar {
  background: var(--navy2);
  padding: 8px 24px;
  display: flex; gap: 24px; align-items: center;
}
.stat-item { display: flex; align-items: center; gap: 8px; }
.stat-label { font-size: 11px; color: rgba(255,255,255,0.5); }
.stat-value { font-size: 14px; font-weight: 700; color: var(--gold); }

/* ─── PRIORITY BADGE ─── */
.priority-high { background: #fdf0f0; color: #8b1a1a; }
.priority-mid  { background: #fff8e7; color: #7a5c00; }
.priority-low  { background: #eafaf1; color: #1a6b3c; }

/* ─── PHOTO ─── */
.photo-thumb {
  position: relative; width: 72px; height: 72px;
  border-radius: 8px; overflow: hidden;
  border: 2px solid var(--border); cursor: pointer;
  transition: transform 0.15s;
}
.photo-thumb:hover { transform: scale(1.05); border-color: var(--gold); }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .photo-del {
  position: absolute; top: 2px; right: 2px;
  background: rgba(0,0,0,0.6); color: white; border: none;
  border-radius: 50%; width: 18px; height: 18px; font-size: 10px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.photo-thumb:hover .photo-del { opacity: 1; }
.photo-thumb .photo-ts {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.5); color: white; font-size: 9px;
  padding: 2px 4px; text-align: center;
}
.card-photos { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.card-photo-mini {
  width: 40px; height: 40px; border-radius: 5px; object-fit: cover;
  border: 1.5px solid var(--border); cursor: pointer;
  transition: transform 0.15s;
}
.card-photo-mini:hover { transform: scale(1.08); }
/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.9); z-index: 500;
  align-items: center; justify-content: center; flex-direction: column; gap: 12px;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 8px; }
.lightbox-close {
  position: absolute; top: 20px; right: 24px;
  background: none; border: none; color: white; font-size: 28px; cursor: pointer;
}
.lightbox-ts { color: rgba(255,255,255,0.6); font-size: 12px; }
.lightbox-nav { display: flex; gap: 12px; }
.lightbox-nav button {
  background: rgba(255,255,255,0.15); border: none; color: white;
  padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px;
}
.lightbox-nav button:hover { background: rgba(255,255,255,0.3); }
.photo-drop-active { border-color: var(--gold) !important; background: rgba(201,168,76,0.08) !important; }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">KPN BOARD</div>
  <div class="header-sep"></div>
  <div class="header-title">ติดตามงานติดตั้ง</div>
  <div class="header-right">
    <div id="syncBadge">🔄 กำลังโหลด...</div>
    <button class="btn-add-card" onclick="openModal()">+ เพิ่มงาน</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">งานทั้งหมด</div><div class="stat-value" id="stat-total">0</div></div>
  <div class="stat-item"><div class="stat-label">กำลังดำเนินการ</div><div class="stat-value" id="stat-active">0</div></div>
  <div class="stat-item"><div class="stat-label">รอเก็บเงิน</div><div class="stat-value" id="stat-collect">0</div></div>
  <div class="stat-item"><div class="stat-label">มูลค่างานรวม</div><div class="stat-value" id="stat-value">฿0</div></div>
  <div class="stat-item"><div class="stat-label" style="color:#ff9999;">⚠️ ยอดค้างชำระ</div><div class="stat-value" id="stat-outstanding" style="color:#ff6b6b;">฿0</div></div>
</div>

<!-- BOARD -->
<div class="board-wrap" id="board"></div>

<!-- MODAL: ADD/EDIT CARD -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">เพิ่มงานใหม่</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>ชื่องาน / โปรเจกต์ *</label>
        <input type="text" id="fTitle" placeholder="เช่น ติดตั้งครัวบิวท์อิน บ้านคุณสมชาย">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ชื่อลูกค้า *</label>
          <input type="text" id="fCustomer" placeholder="ชื่อลูกค้า">
        </div>
        <div class="form-group">
          <label>เบอร์โทร</label>
          <input type="text" id="fPhone" placeholder="0xx-xxx-xxxx">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>มูลค่างาน (บาท)</label>
          <input type="number" id="fAmount" placeholder="0">
        </div>
        <div class="form-group">
          <label>สาขา</label>
          <select id="fBranch">
            <option value="สำนักงานใหญ่">สำนักงานใหญ่</option>
            <option value="เชียงใหม่">เชียงใหม่</option>
            <option value="ลำพูน">ลำพูน</option>
            <option value="เชียงราย">เชียงราย</option>
            <option value="กรุงเทพ">กรุงเทพ</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>วันนัดติดตั้ง</label>
          <input type="date" id="fDate">
        </div>
        <div class="form-group">
          <label>ความสำคัญ</label>
          <select id="fPriority">
            <option value="mid">🟡 ปกติ</option>
            <option value="high">🔴 ด่วน</option>
            <option value="low">🟢 ไม่เร่ง</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>สถานะ</label>
        <select id="fStatus">
          <option value="order">📋 รับออเดอร์</option>
          <option value="measure">📐 วัดหน้างานแล้ว</option>
          <option value="design">✏️ ทำแบบแล้ว</option>
          <option value="quoted">📄 ส่งใบเสนอราคาแล้ว</option>
          <option value="deposit">💰 มัดจำแล้ว</option>
          <option value="making">🔨 กำลังผลิต</option>
          <option value="install">🚚 กำลังติดตั้ง</option>
          <option value="collect">💳 รอเก็บเงิน</option>
          <option value="done">✅ ปิดงาน</option>
        </select>
      </div>
      <div class="form-group">
        <label>หมายเหตุ</label>
        <textarea id="fNote" rows="2" placeholder="รายละเอียดงาน, ที่อยู่ติดตั้ง..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>👷 ช่างที่รับผิดชอบ</label>
          <input type="text" id="fTech" placeholder="ชื่อช่าง/ทีม">
        </div>
        <div class="form-group">
          <label>💳 สถานะชำระ</label>
          <select id="fPayment">
            <option value="none">— ยังไม่ชำระ</option>
            <option value="deposit">มัดจำแล้ว (50%)</option>
            <option value="partial">ชำระบางส่วน</option>
            <option value="paid">ชำระครบแล้ว ✅</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>💰 ยอดที่รับมาแล้ว (บาท)</label>
          <input type="number" id="fPaid" placeholder="0">
        </div>
        <div class="form-group">
          <label>🔗 อ้างอิงใบเสนอราคา</label>
          <input type="text" id="fRef" placeholder="QT-2603-001">
        </div>
      </div>

      <!-- PHOTO SECTION -->
      <div class="form-group">
        <label>📷 รูปภาพหน้างาน (สูงสุด 5 รูป)</label>
        <div id="photoDropZone" onclick="document.getElementById('photoInput').click()"
          style="border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--cream);">
          <div style="font-size:24px;">📸</div>
          <div style="font-size:12px;color:var(--gray);margin-top:4px;">คลิกหรือลากรูปมาวางที่นี่</div>
          <div style="font-size:11px;color:var(--gray);margin-top:2px;">รองรับ JPG, PNG (อัตโนมัติบีบอัดให้เล็กลง)</div>
        </div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none;" onchange="handlePhotoSelect(event)">
        <div id="photoPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btnDelete" style="display:none;" onclick="promptDeletePin()">🔒 ลบ (ใส่รหัส)</button>
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveCard()">💾 บันทึก</button>
    </div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="pinModal">
  <div class="modal" style="max-width:340px;">
    <div class="modal-header">
      <div class="modal-title">🔒 ยืนยันการลบ</div>
      <button class="modal-close" onclick="closePinModal()">✕</button>
    </div>
    <div class="modal-body" style="gap:10px;">
      <div style="background:#fff3cd;border-radius:8px;padding:10px 14px;font-size:12px;color:#7a5c00;border:1px solid #ffe08a;">
        ⚠️ การลบข้อมูลไม่สามารถกู้คืนได้ กรุณาใส่รหัสผู้จัดการ
      </div>
      <div class="form-group">
        <label>รหัสผู้จัดการ (PIN 4 หลัก)</label>
        <input type="password" id="pinInput" maxlength="4" placeholder="••••"
          style="font-size:22px;letter-spacing:8px;text-align:center;"
          onkeydown="if(event.key==='Enter')confirmDelete()">
      </div>
      <div id="pinError" style="color:#c0392b;font-size:12px;display:none;">❌ รหัสไม่ถูกต้อง</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closePinModal()">ยกเลิก</button>
      <button class="btn btn-danger" onclick="confirmDelete()">🗑 ยืนยันลบ</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toastMsg"></span></div>

<script>
// ═══════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://qybntZlfnrcownntzmir.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6j2J4OEC2Py4ujz7cpkyyA_jGZnyWt4';

const supa = {
  async req(method, table, body=null, params='') {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
      method,
      headers: {
        'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': method==='POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal',
      },
      body: body ? JSON.stringify(body) : null,
    });
    if (!res.ok) throw new Error(await res.text());
    return method === 'GET' ? res.json() : true;
  },
  get: (t,p='') => supa.req('GET',t,null,p),
  upsert: (t,d) => supa.req('POST',t,Array.isArray(d)?d:[d]),
  del: (t,id) => supa.req('DELETE',t,null,`?id=eq.${id}`),
  patch: (t,id,d) => fetch(`${SUPABASE_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'},body:JSON.stringify(d)}),
};

// ═══════════════════════════════════════════
// COLUMNS CONFIG
// ═══════════════════════════════════════════
const COLUMNS = [
  { id:'order',    label:'📋 รับออเดอร์',          bg:'#e8f0fe', dot:'#4285f4', text:'#1a3a6e' },
  { id:'measure',  label:'📐 วัดหน้างานแล้ว',      bg:'#ede7f6', dot:'#7c4dff', text:'#311b6e' },
  { id:'design',   label:'✏️ ทำแบบแล้ว',           bg:'#fce4ec', dot:'#e91e63', text:'#6a0032' },
  { id:'quoted',   label:'📄 ส่งใบเสนอราคาแล้ว',  bg:'#e3f2fd', dot:'#1976d2', text:'#0d3060' },
  { id:'deposit',  label:'💰 มัดจำแล้ว',           bg:'#fff8e1', dot:'#f9a825', text:'#6b4c00' },
  { id:'making',   label:'🔨 กำลังผลิต',           bg:'#fff3e0', dot:'#e65100', text:'#7d3100' },
  { id:'install',  label:'🚚 กำลังติดตั้ง',        bg:'#e0f7fa', dot:'#0097a7', text:'#004d56' },
  { id:'collect',  label:'💳 รอเก็บเงิน',          bg:'#fbe9e7', dot:'#d84315', text:'#7b1a00' },
  { id:'done',     label:'✅ ปิดงาน',              bg:'#e8f5e9', dot:'#2e7d32', text:'#1b4a1e' },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let cards = [];
let dragId = null;

// ═══════════════════════════════════════════
// INIT BOARD HTML
// ═══════════════════════════════════════════
function initBoard() {
  document.getElementById('board').innerHTML = COLUMNS.map(col => `
    <div class="column" id="col-${col.id}">
      <div class="col-header" style="background:${col.bg};">
        <div class="col-title" style="color:${col.text};">
          <div class="col-dot" style="background:${col.dot};"></div>
          ${col.label}
        </div>
        <div class="col-count" id="count-${col.id}" style="color:${col.text};">0</div>
      </div>
      <div class="col-body" id="body-${col.id}"
        ondragover="onDragOver(event,'${col.id}')"
        ondragleave="onDragLeave('${col.id}')"
        ondrop="onDrop(event,'${col.id}')">
      </div>
      <button class="col-add-btn" onclick="openModal('${col.id}')">+ เพิ่มงาน</button>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
// RENDER CARDS
// ═══════════════════════════════════════════
function renderCards() {
  COLUMNS.forEach(col => {
    const colCards = cards.filter(c => c.status === col.id);
    document.getElementById(`count-${col.id}`).textContent = colCards.length;
    document.getElementById(`body-${col.id}`).innerHTML = colCards.map(c => cardHTML(c)).join('');
  });
  updateStats();

  // Re-attach drag events
  document.querySelectorAll('.card').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragId = el.dataset.id;
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });
}

function cardHTML(c) {
  const fmt = n => '฿' + (+n||0).toLocaleString('th-TH',{minimumFractionDigits:0});
  const fmtDate = d => d ? new Date(d).toLocaleDateString('th-TH',{day:'numeric',month:'short'}) : '';
  const pClass = {'high':'priority-high','mid':'priority-mid','low':'priority-low'}[c.priority||'mid'];
  const pLabel = {'high':'🔴 ด่วน','mid':'','low':'🟢 ไม่เร่ง'}[c.priority||'mid'];
  const isOverdue = c.install_date && new Date(c.install_date) < new Date() && c.status !== 'done';
  const payLabel = {'deposit':'💰 มัดจำแล้ว','partial':'💳 บางส่วน','paid':'✅ ครบแล้ว','none':''}[c.payment||'none'];
  const payClass = {'deposit':'priority-mid','partial':'priority-mid','paid':'priority-low','none':''}[c.payment||'none'];
  const remaining = (+c.amount||0) - (+c.paid_amount||0);
  return `
    <div class="card" draggable="true" data-id="${c.id}" onclick="openModal(null,'${c.id}')">
      ${pLabel ? `<div class="card-tag ${pClass}">${pLabel}</div>` : ''}
      ${payLabel ? `<div class="card-tag ${payClass}" style="margin-left:4px;">${payLabel}</div>` : ''}
      <div class="card-title">${c.title}</div>
      <div class="card-customer">👤 ${c.customer}</div>
      ${c.technician ? `<div class="card-customer">👷 ${c.technician}</div>` : ''}
      ${c.amount ? `<div class="card-amount">${fmt(c.amount)} ${c.payment==='paid'?'':remaining>0?`<span style="font-size:11px;color:#c0392b;">ค้าง ${fmt(remaining)}</span>`:''}` : ''}
      ${c.photos && c.photos.length ? cardPhotosHTML(c.photos) : ''}
      <div class="card-meta">
        <div class="card-date" style="color:${isOverdue?'#c0392b':''};">
          ${c.install_date ? (isOverdue?'⚠️ ':'')+fmtDate(c.install_date) : ''}
          ${c.branch ? `<span style="margin-left:4px;opacity:0.6;">${c.branch}</span>` : ''}
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="event.stopPropagation();moveCard('${c.id}',-1)" title="ย้ายซ้าย">◀</button>
          <button class="card-btn" onclick="event.stopPropagation();moveCard('${c.id}',1)" title="ย้ายขวา">▶</button>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function updateStats() {
  const active = cards.filter(c => !['done'].includes(c.status)).length;
  const collect = cards.filter(c => c.status === 'collect').length;
  const total = cards.reduce((s,c) => s + (+c.amount||0), 0);
  const outstanding = cards.filter(c => c.payment !== 'paid' && c.status !== 'done')
    .reduce((s,c) => s + Math.max(0, (+c.amount||0) - (+c.paid_amount||0)), 0);
  document.getElementById('stat-total').textContent = cards.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-collect').textContent = collect;
  document.getElementById('stat-value').textContent = '฿' + total.toLocaleString('th-TH');
  document.getElementById('stat-outstanding').textContent = '฿' + outstanding.toLocaleString('th-TH');
}

// ═══════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════
function onDragOver(e, colId) {
  e.preventDefault();
  document.getElementById(`body-${colId}`).classList.add('drag-over');
}
function onDragLeave(colId) {
  document.getElementById(`body-${colId}`).classList.remove('drag-over');
}
async function onDrop(e, colId) {
  e.preventDefault();
  document.getElementById(`body-${colId}`).classList.remove('drag-over');
  if (!dragId) return;
  await updateStatus(dragId, colId);
  dragId = null;
}

async function moveCard(id, dir) {
  const card = cards.find(c => String(c.id) === String(id));
  if (!card) return;
  const idx = COLUMNS.findIndex(c => c.id === card.status);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= COLUMNS.length) return;
  await updateStatus(id, COLUMNS[newIdx].id);
}

async function updateStatus(id, newStatus) {
  const card = cards.find(c => String(c.id) === String(id));
  if (!card || card.status === newStatus) return;
  card.status = newStatus;
  renderCards();
  try {
    await supa.patch('kanban_cards', id, { status: newStatus });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function openModal(defaultStatus=null, editId=null) {
  const modal = document.getElementById('cardModal');
  const card = editId ? cards.find(c => String(c.id) === String(editId)) : null;

  document.getElementById('modalTitle').textContent = card ? 'แก้ไขงาน' : 'เพิ่มงานใหม่';
  document.getElementById('editId').value = card ? card.id : '';
  document.getElementById('fTitle').value = card ? card.title : '';
  document.getElementById('fCustomer').value = card ? card.customer : '';
  document.getElementById('fPhone').value = card ? (card.phone||'') : '';
  document.getElementById('fAmount').value = card ? (card.amount||'') : '';
  document.getElementById('fBranch').value = card ? (card.branch||'สำนักงานใหญ่') : 'สำนักงานใหญ่';
  document.getElementById('fDate').value = card ? (card.install_date||'') : '';
  document.getElementById('fPriority').value = card ? (card.priority||'mid') : 'mid';
  document.getElementById('fStatus').value = card ? card.status : (defaultStatus||'new');
  document.getElementById('fNote').value = card ? (card.note||'') : '';
  document.getElementById('fTech').value = card ? (card.technician||'') : '';
  document.getElementById('fPayment').value = card ? (card.payment||'none') : 'none';
  document.getElementById('fPaid').value = card ? (card.paid_amount||'') : '';
  document.getElementById('fRef').value = card ? (card.ref_doc||'') : '';
  document.getElementById('btnDelete').style.display = card ? 'block' : 'none';

  // Load photos
  currentPhotos = card && card.photos ? JSON.parse(JSON.stringify(card.photos)) : [];
  renderPhotoPreview();

  modal.classList.add('show');
  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('cardModal').classList.remove('show');
}

async function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  const customer = document.getElementById('fCustomer').value.trim();
  if (!title || !customer) return showToast('กรุณากรอกชื่องานและลูกค้า');

  const editId = document.getElementById('editId').value;
  const obj = {
    id: editId || String(Date.now()),
    title, customer,
    phone: document.getElementById('fPhone').value,
    amount: +document.getElementById('fAmount').value || 0,
    branch: document.getElementById('fBranch').value,
    install_date: document.getElementById('fDate').value || null,
    priority: document.getElementById('fPriority').value,
    status: document.getElementById('fStatus').value,
    note: document.getElementById('fNote').value,
    technician: document.getElementById('fTech').value,
    payment: document.getElementById('fPayment').value,
    paid_amount: +document.getElementById('fPaid').value || 0,
    ref_doc: document.getElementById('fRef').value,
    photos: currentPhotos,
  };

  setSyncStatus('syncing');
  try {
    await supa.upsert('kanban_cards', obj);
    if (editId) {
      cards = cards.map(c => String(c.id)===String(editId) ? {...c,...obj} : c);
      showToast('✅ แก้ไขงานแล้ว');
    } else {
      cards.push(obj);
      showToast('✅ เพิ่มงานใหม่แล้ว');
    }
    setSyncStatus('ok');
    closeModal();
    renderCards();
  } catch(e) {
    setSyncStatus('error');
    showToast('❌ บันทึกไม่สำเร็จ: ' + e.message);
  }
}

// ─── PIN-PROTECTED DELETE ───
const DELETE_PIN = '1919'; // ← เปลี่ยนรหัสตรงนี้ได้เลยครับ

function promptDeletePin() {
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').style.display = 'none';
  document.getElementById('pinModal').classList.add('show');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}
function closePinModal() {
  document.getElementById('pinModal').classList.remove('show');
}
async function confirmDelete() {
  const pin = document.getElementById('pinInput').value;
  if (pin !== DELETE_PIN) {
    document.getElementById('pinError').style.display = 'block';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
    return;
  }
  closePinModal();
  const id = document.getElementById('editId').value;
  if (!id) return;
  setSyncStatus('syncing');
  try {
    await supa.del('kanban_cards', id);
    cards = cards.filter(c => String(c.id) !== String(id));
    setSyncStatus('ok');
    closeModal();
    renderCards();
    showToast('🗑 ลบงานแล้ว');
  } catch(e) { setSyncStatus('error'); showToast('❌ ลบไม่สำเร็จ'); }
}
// close PIN modal on backdrop click
document.getElementById('pinModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pinModal')) closePinModal();
});

// ═══════════════════════════════════════════
// SYNC STATUS
// ═══════════════════════════════════════════
function setSyncStatus(s) {
  const el = document.getElementById('syncBadge');
  const m = { syncing:'🔄 กำลังซิงค์...', ok:'☁️ ซิงค์แล้ว', error:'⚠️ ซิงค์ไม่สำเร็จ' };
  el.textContent = m[s] || s;
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════
// LOAD FROM SUPABASE
// ═══════════════════════════════════════════
async function loadCards() {
  setSyncStatus('syncing');
  try {
    const data = await supa.get('kanban_cards', '?order=created_at.desc');
    cards = data;
    renderCards();
    setSyncStatus('ok');
  } catch(e) {
    setSyncStatus('error');
    showToast('⚠️ โหลดข้อมูลไม่สำเร็จ — ตรวจสอบการเชื่อมต่อ');
  }
}

// Close on backdrop click
document.getElementById('cardModal').addEventListener('click', e => {
  if (e.target === document.getElementById('cardModal')) closeModal();
});

// Auto refresh every 30s
setInterval(() => { if (document.visibilityState==='visible') loadCards(); }, 30000);


// ═══════════════════════════════════════════
// PHOTO SYSTEM
// ═══════════════════════════════════════════
let currentPhotos = []; // [{data: base64, ts: timestamp}]
let lightboxPhotos = [];
let lightboxIdx = 0;

// Compress image to base64 (~100KB max)
function compressImage(file, maxW=800, quality=0.75) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        res(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelect(event) {
  const files = Array.from(event.target.files);
  const remaining = 5 - currentPhotos.length;
  if (remaining <= 0) return showToast('⚠️ ใส่ได้สูงสุด 5 รูป');
  const toAdd = files.slice(0, remaining);
  showToast('🔄 กำลังบีบอัดรูป...');
  for (const file of toAdd) {
    const data = await compressImage(file);
    const ts = new Date().toLocaleString('th-TH', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    currentPhotos.push({ data, ts });
  }
  renderPhotoPreview();
  event.target.value = '';
}

function renderPhotoPreview() {
  const wrap = document.getElementById('photoPreview');
  if (!wrap) return;
  wrap.innerHTML = currentPhotos.map((p, i) => `
    <div class="photo-thumb">
      <img src="${p.data}" onclick="openLightboxFromModal(${i})">
      <div class="photo-ts">${p.ts}</div>
      <button class="photo-del" onclick="removePhoto(${i})">✕</button>
    </div>
  `).join('');
}

function removePhoto(idx) {
  currentPhotos.splice(idx, 1);
  renderPhotoPreview();
}

// Drag & drop
const dz = document.getElementById('photoDropZone');
if (dz) {
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('photo-drop-active'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('photo-drop-active'));
  dz.addEventListener('drop', async e => {
    e.preventDefault();
    dz.classList.remove('photo-drop-active');
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
    const fakeEvt = { target: { files, value: '' } };
    await handlePhotoSelect(fakeEvt);
  });
}

// Show photos on card
function cardPhotosHTML(photos) {
  if (!photos || !photos.length) return '';
  return `<div class="card-photos">${photos.slice(0,5).map((p,i) =>
    `<img class="card-photo-mini" src="${p.data}" title="${p.ts}" onclick="event.stopPropagation();openLightbox(${JSON.stringify(photos)},${i})">`
  ).join('')}</div>`;
}

// Lightbox
function openLightbox(photos, idx) {
  lightboxPhotos = photos;
  lightboxIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('show');
}
function openLightboxFromModal(idx) {
  openLightbox(currentPhotos, idx);
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
}
function lightboxNav(dir) {
  lightboxIdx = (lightboxIdx + dir + lightboxPhotos.length) % lightboxPhotos.length;
  updateLightbox();
}
function updateLightbox() {
  const p = lightboxPhotos[lightboxIdx];
  document.getElementById('lightboxImg').src = p.data;
  document.getElementById('lightboxTs').textContent = `${lightboxIdx+1}/${lightboxPhotos.length} — ${p.ts}`;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'ArrowRight') lightboxNav(1);
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'Escape') closeLightbox();
});

// Init
initBoard();
loadCards();
</script>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="">
  <div class="lightbox-ts" id="lightboxTs"></div>
  <div class="lightbox-nav">
    <button onclick="lightboxNav(-1)">◀ ก่อนหน้า</button>
    <button onclick="lightboxNav(1)">ถัดไป ▶</button>
  </div>
</div>
