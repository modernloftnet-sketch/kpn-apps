<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อนุมัติรายจ่าย — The Built</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a1a1a; --navy2:#2d2d2d; --gold:#f0c040; --gold2:#f5d47a;
  --bg:#f4f5f7; --card:#fff; --text:#1a1a2e; --muted:#6b7280;
  --green:#1a6b3c; --green-bg:#e8f5ec; --green-line:#bfe3cb;
  --yellow:#8a6d1a; --yellow-bg:#fdf6e3; --yellow-line:#f0dfa8;
  --red:#b3261e; --border:#e3e6ea; --shadow:0 2px 12px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ===== Login ===== */
#lock{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000}
.lock-box{background:var(--card);border-radius:16px;padding:36px 32px;width:340px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.lock-title{font-size:20px;font-weight:700;color:var(--navy);text-align:center}
.lock-sub{font-size:13px;color:var(--muted);text-align:center;margin-top:4px;margin-bottom:22px}
.lock-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
.lock-input,.lock-select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:9px;font-family:'Sarabun';font-size:14px;margin-bottom:14px}
.lock-input:focus,.lock-select:focus{outline:none;border-color:var(--gold)}
.lock-input.error{border-color:var(--red);animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.lock-btn{width:100%;padding:12px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;font-family:'Sarabun';font-size:15px;font-weight:700;cursor:pointer}
.lock-btn:hover{background:var(--gold2)}
.lock-error{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-top:8px}

/* ===== App ===== */
#app{display:none}
.topbar{background:var(--navy);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar .brand{font-size:18px;font-weight:700;color:var(--gold)}
.topbar .brand small{color:rgba(255,255,255,.6);font-weight:400;font-size:13px;margin-left:8px}
.topbar .user{font-size:13px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:14px}
.topbar .user button{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:6px 12px;font-family:'Sarabun';font-size:12px;cursor:pointer}
.wrap{max-width:1080px;margin:0 auto;padding:22px 18px 60px}

.bar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.stat{background:var(--card);border-radius:12px;padding:14px 18px;box-shadow:var(--shadow);flex:1;min-width:130px}
.stat .n{font-size:26px;font-weight:700}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
.stat.green .n{color:var(--green)} .stat.yellow .n{color:var(--yellow)} .stat.wait .n{color:#1e5aa8}
.btn{border:none;border-radius:9px;padding:10px 16px;font-family:'Sarabun';font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.btn-refresh{background:var(--card);border:1.5px solid var(--border);color:var(--navy)}
.btn-approve{background:var(--green);color:#fff}
.btn-approve:hover{filter:brightness(1.1)}
.btn-approve:disabled{opacity:.4;cursor:not-allowed}
.btn-paid{background:#1e5aa8;color:#fff}
.btn-paid:hover{filter:brightness(1.1)}
.btn-paid:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-reject{background:#fff;border:1.5px solid var(--red);color:var(--red)}

.section{margin-bottom:28px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.section-head h2{font-size:16px;font-weight:700}
.dot{width:11px;height:11px;border-radius:50%}
.dot.green{background:var(--green)} .dot.yellow{background:var(--yellow)} .dot.wait{background:#1e5aa8}
.section-head .count{background:var(--border);color:var(--muted);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}

/* green cards = table-like rows */
.gtable{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.grow{display:grid;grid-template-columns:38px 1.6fr 1fr .8fr 1fr;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.grow:last-child{border-bottom:none}
.grow.head{background:var(--green-bg);font-size:12px;font-weight:700;color:var(--green)}
.grow input[type=checkbox]{width:18px;height:18px;cursor:pointer}
.grow .amt{font-weight:700}
.grow .cat{display:inline-block;background:var(--green-bg);color:var(--green);border-radius:6px;padding:2px 9px;font-size:12px}
.grow .who{color:var(--muted);font-size:13px}

/* yellow cards = detailed */
.ycard{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:16px;margin-bottom:12px;border-left:4px solid var(--yellow)}
.ycard .raw{background:var(--yellow-bg);border-radius:8px;padding:10px 12px;font-size:13px;color:#5c4d1a;white-space:pre-wrap;margin-bottom:12px;max-height:150px;overflow:auto}
.yfields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.yf{display:flex;flex-direction:column;gap:3px}
.yf label{font-size:11px;font-weight:600;color:var(--muted)}
.yf input,.yf select{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Sarabun';font-size:13px}
.yf input:focus,.yf select:focus{outline:none;border-color:var(--gold)}
.yf.low input,.yf.low select{border-color:var(--yellow);background:var(--yellow-bg)}
.ycard .acts{display:flex;gap:8px;justify-content:flex-end}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:8px}
.edit-btn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.5;padding:2px 4px;border-radius:5px}
.edit-btn:hover{opacity:1;background:var(--border)}
.del-btn{background:none;border:none;cursor:pointer;font-size:12px;opacity:.4;padding:2px 4px;border-radius:5px}
.del-btn:hover{opacity:1;background:#fde8e8}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:600;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:14px;padding:24px;width:440px;max-width:100%;max-height:90vh;overflow:auto}
.modal-title{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-raw{background:var(--yellow-bg);border-radius:8px;padding:10px 12px;font-size:12px;color:#5c4d1a;white-space:pre-wrap;margin-bottom:16px;max-height:120px;overflow:auto}
.modal-acts{display:flex;gap:10px;justify-content:flex-end}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--navy)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:500;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

/* ===== Tabs ===== */
.topbar .tabs{display:flex;gap:6px}
.topbar .tab{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:7px 16px;font-family:'Sarabun';font-size:13px;font-weight:600;cursor:pointer}
.topbar .tab:hover{color:#fff}
.topbar .tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}

/* ===== Recurring ===== */
.rec-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.rec-head h2{font-size:18px;font-weight:700}
.rec-total{background:var(--card);border-radius:10px;padding:8px 14px;box-shadow:var(--shadow);font-size:13px;color:var(--muted)}
.rec-total b{color:var(--navy);font-size:15px}
.btn-add{background:var(--gold);color:var(--navy)}
.btn-add:hover{background:var(--gold2)}
.rtable{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow-x:auto}
.rrow{display:grid;grid-template-columns:1.6fr 1fr 62px 1fr 96px 128px;gap:10px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);min-width:680px}
.rrow:last-child{border-bottom:none}
.rrow.head{background:var(--navy);color:var(--gold);font-size:12px;font-weight:700}
.rrow.off{opacity:.5}
.rrow .amt{font-weight:700}
.rrow .day{display:inline-block;background:#e9eefb;color:#1e5aa8;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700}
.rrow .cat{display:inline-block;background:var(--green-bg);color:var(--green);border-radius:6px;padding:2px 9px;font-size:12px}
.rrow .bank{color:var(--muted);font-size:12px}
.racts{display:flex;gap:5px;justify-content:flex-end;align-items:center}
.tgl{position:relative;width:38px;height:21px;flex:none;cursor:pointer;display:inline-block}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl .sl{position:absolute;inset:0;background:#ccc;border-radius:20px;transition:.2s}
.tgl .sl:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tgl input:checked + .sl{background:var(--green)}
.tgl input:checked + .sl:before{transform:translateX(17px)}
@media(max-width:720px){
  .grow{grid-template-columns:30px 1fr;gap:6px}
  .grow .cat,.grow .who,.grow.head span:nth-child(n+3){display:none}
  .yfields{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="lock">
  <div class="lock-box">
    <div class="lock-title">อนุมัติรายจ่าย</div>
    <div class="lock-sub">The Built — เข้าสู่ระบบ</div>
    <label class="lock-label">ผู้ใช้</label>
    <select class="lock-select" id="lockUser"><option value="">— เลือกชื่อ —</option></select>
    <label class="lock-label">PIN</label>
    <input type="password" class="lock-input" id="lockInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLock()">
    <button class="lock-btn" onclick="checkLock()">เข้าสู่ระบบ</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <div class="topbar">
    <div class="brand">The Built <small>อนุมัติรายจ่าย</small></div>
    <div class="tabs">
      <button class="tab active" id="tabApprove" onclick="switchView('approve')">รออนุมัติ</button>
      <button class="tab" id="tabRecurring" onclick="switchView('recurring')">รายจ่ายประจำ</button>
    </div>
    <div class="user"><span id="whoami"></span><button onclick="logout()">ออกจากระบบ</button></div>
  </div>
  <div class="wrap">
    <div id="viewApprove">
    <div class="bar">
      <div class="stat wait"><div class="n" id="cntWaiting">0</div><div class="l">รอ Joy โอน</div></div>
      <div class="stat green"><div class="n" id="cntReady">0</div><div class="l">พร้อมอนุมัติ</div></div>
      <div class="stat yellow"><div class="n" id="cntYellow">0</div><div class="l">ต้องตรวจก่อน</div></div>
      <button class="btn btn-refresh" onclick="loadData()" style="margin-left:auto">↻ รีเฟรช</button>
    </div>

    <!-- WAITING PAYMENT -->
    <div class="section" id="waitingSection">
      <div class="section-head">
        <span class="dot wait"></span><h2>รอ Joy โอนเงิน</h2><span class="count" id="waitingCount">0</span>
        <button class="btn btn-paid btn-sm" id="btnPaid" style="margin-left:auto" onclick="confirmPaid()" disabled>โอนแล้ว</button>
      </div>
      <div id="waitingBody"></div>
    </div>

    <!-- READY TO APPROVE -->
    <div class="section" id="readySection">
      <div class="section-head">
        <span class="dot green"></span><h2>พร้อมอนุมัติ (โอนแล้ว)</h2><span class="count" id="readyCount">0</span>
        <button class="btn btn-approve btn-sm" id="btnApprove" style="margin-left:auto" onclick="approveReady()" disabled>อนุมัติที่เลือก</button>
      </div>
      <div id="readyBody"></div>
    </div>

    <!-- NEEDS REVIEW -->
    <div class="section" id="yellowSection">
      <div class="section-head">
        <span class="dot yellow"></span><h2>ต้องตรวจก่อน</h2><span class="count" id="yellowCount">0</span>
      </div>
      <div id="yellowBody"></div>
    </div>
    </div><!-- /viewApprove -->

    <!-- ===== RECURRING VIEW ===== -->
    <div id="viewRecurring" style="display:none">
      <div class="rec-head">
        <h2>รายจ่ายประจำ</h2>
        <span class="rec-total" id="recTotal">—</span>
        <button class="btn btn-add" style="margin-left:auto" onclick="openRec()">➕ เพิ่มรายการ</button>
      </div>
      <div id="recBody"></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-title">แก้ไขรายการ</div>
    <div class="modal-raw" id="editRaw"></div>
    <input type="hidden" id="editId">
    <div class="yf" style="margin-bottom:10px"><label>รายการ</label><input id="editDesc"></div>
    <div class="yf" style="margin-bottom:10px"><label>ยอดเงิน (บาท)</label><input id="editAmount" type="number" step="0.01"></div>
    <div class="yf" style="margin-bottom:10px"><label>หมวด</label><select id="editCat"></select></div>
    <div class="yf" style="margin-bottom:10px"><label>ผู้จ่าย</label><input id="editPaidBy"></div>
    <div class="yf" style="margin-bottom:16px"><label>วันที่</label><input id="editDate" type="date"></div>
    <div class="modal-acts">
      <button class="btn btn-outline" onclick="closeEdit()">ยกเลิก</button>
      <button class="btn btn-approve" onclick="saveEdit()">บันทึกการแก้ไข</button>
    </div>
  </div>
</div>

<!-- RECURRING ADD/EDIT MODAL -->
<div class="modal-bg" id="recModal">
  <div class="modal">
    <div class="modal-title" id="recModalTitle">เพิ่มรายจ่ายประจำ</div>
    <input type="hidden" id="recId">
    <div class="yf" style="margin-bottom:10px"><label>ชื่อรายการ</label><input id="recDesc" placeholder="เช่น ค่างวดอาคาร"></div>
    <div class="yf" style="margin-bottom:10px"><label>ยอดเงิน (บาท)</label><input id="recAmount" type="number" step="0.01"></div>
    <div class="yf" style="margin-bottom:10px"><label>วันที่จ่ายของทุกเดือน (1-31)</label><input id="recDay" type="number" min="1" max="31" placeholder="เช่น 5"></div>
    <div class="yf" style="margin-bottom:10px"><label>หมวด</label><select id="recCat"></select></div>
    <div class="yf" style="margin-bottom:12px"><label>ธนาคาร / หมายเหตุ</label><input id="recBank" placeholder="เช่น ธ.กสิกร (เว้นว่างได้)"></div>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;cursor:pointer"><input type="checkbox" id="recActive" checked style="width:18px;height:18px"> เปิดใช้งาน (ยิงเข้าอัตโนมัติทุกเดือน)</label>
    <div class="modal-acts">
      <button class="btn btn-outline" onclick="closeRec()">ยกเลิก</button>
      <button class="btn btn-approve" onclick="saveRec()">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== CONFIG ==========
// kpn-inbox (กล่องพัก + edge functions)
const INBOX_URL = 'https://kgjymqajwkhymqcofkhn.supabase.co';
const INBOX_KEY = 'sb_publishable_jfL6yrLhd8ct8uiK7bRLpg_e2RDPO31';   // <-- ใส่ publishable key ของ kpn-inbox
// kpn-house (ดึงรายชื่อพนักงาน tb_staff + หมวด tb_exp_cats)
const HOUSE_URL = 'https://qybntzlfnrcownntzmir.supabase.co';
const HOUSE_KEY = 'sb_publishable_6j2J4OEC2Py4ujz7cpkyyA_jGZnyWt4';
const APPROVE_FN = INBOX_URL + '/functions/v1/expense-approve';

// ========== LOGIN (เหมือน thebuilt-invoice) ==========
const SPECIAL = {
  '__owner__': { pin:'16012521', role:'owner',    name:'Owner' },
  '__um__':    { pin:'123456',   role:'approver',  name:'ฐิตินันท์ วิญญาป่า (อุ้ม)' },
  '__admin__': { pin:'123456',   role:'admin',     name:'Admin' },
};
let CUR_USER = '';
let CUR_ROLE = '';

// แสดง/ซ่อนแท็บรายจ่ายประจำตามสิทธิ์ (เฉพาะ owner)
function applyRole(){
  const isOwner = CUR_ROLE === 'owner';
  const tab = document.getElementById('tabRecurring');
  if(tab) tab.style.display = isOwner ? '' : 'none';
  if(!isOwner){ switchView('approve'); }  // กันคนอื่นเข้าหน้ารายจ่ายประจำ
}

async function populateUsers(){
  const sel = document.getElementById('lockUser');
  try{
    const r = await fetch(`${HOUSE_URL}/rest/v1/tb_staff?order=name&select=id,name,position,pin`,
      { headers:{ apikey:HOUSE_KEY, Authorization:'Bearer '+HOUSE_KEY }});
    const staff = await r.json();
    (staff||[]).filter(s=>s.pin).forEach(s=>{
      const o=document.createElement('option');
      o.value=s.id; o.dataset.name=s.name; o.dataset.pin=s.pin;
      o.textContent=s.name+' ('+(s.position||'')+')'; sel.appendChild(o);
    });
  }catch(e){ console.warn('load staff failed',e); }
  // บัญชีเฉพาะ Dashboard นี้
  [
    { value:'__owner__', label:'Owner (ผู้บริหาร)' },
    { value:'__um__',    label:'ฐิตินันท์ วิญญาป่า (อุ้ม)' },
    { value:'__admin__', label:'Admin' },
  ].forEach(a=>{
    const o=document.createElement('option'); o.value=a.value; o.textContent=a.label; sel.appendChild(o);
  });
}
function checkLock(){
  const sel=document.getElementById('lockUser'), pin=document.getElementById('lockInput').value.trim();
  const err=document.getElementById('lockError'), inp=document.getElementById('lockInput');
  const uid=sel.value;
  if(!uid){ err.textContent='เลือกชื่อผู้ใช้ก่อน'; return; }
  if(!pin){ err.textContent='กรอก PIN'; inp.focus(); return; }
  let ok=false, name='';
  if(SPECIAL[uid]){ if(pin===SPECIAL[uid].pin){ ok=true; name=SPECIAL[uid].name; CUR_ROLE=SPECIAL[uid].role; } }
  else { const opt=sel.options[sel.selectedIndex]; if(opt&&opt.dataset.pin===pin){ ok=true; name=opt.dataset.name; CUR_ROLE='staff'; } }
  if(ok){
    CUR_USER=name;
    sessionStorage.setItem('exp_user',name);
    sessionStorage.setItem('exp_role',CUR_ROLE);
    applyRole();
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('whoami').textContent='👤 '+name;
    loadData();
  } else {
    inp.classList.add('error'); err.textContent='PIN ไม่ถูกต้อง'; inp.value='';
    setTimeout(()=>{ inp.classList.remove('error'); inp.focus(); },400);
  }
}
function logout(){ sessionStorage.removeItem('exp_user'); sessionStorage.removeItem('exp_role'); location.reload(); }

// ========== DATA ==========
let CATS=[];   // [{id,label}]
let ROWS=[];   // pending-ready rows

async function loadCats(){
  try{
    const r=await fetch(`${HOUSE_URL}/rest/v1/tb_exp_cats?order=sort_order&select=id,label`,
      { headers:{ apikey:HOUSE_KEY, Authorization:'Bearer '+HOUSE_KEY }});
    CATS=await r.json();
  }catch(e){ CATS=[]; }
}
async function loadData(){
  await loadCats();
  try{
    const r=await fetch(`${INBOX_URL}/rest/v1/expense_inbox?status=in.(ready_green,ready_yellow)&order=created_at.asc&select=*`,
      { headers:{ apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY }});
    ROWS=await r.json();
  }catch(e){ ROWS=[]; toast('โหลดข้อมูลไม่สำเร็จ'); }
  render();
}
function catLabel(id){ const c=CATS.find(x=>x.id===id); return c?c.label:(id||'—'); }
function fmt(n){ return (Number(n)||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function catOptions(sel){ return '<option value="">— หมวด —</option>'+CATS.map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${c.label}</option>`).join(''); }

function render(){
  // 3 โซน:
  // 🕐 รอโอน = AI อ่านเสร็จ (ready_green/yellow) แต่ยังไม่กดโอน + ต้องเป็นเขียว (ชัดแล้ว)
  //           รายการเหลืองที่ยังไม่แก้ ไปอยู่โซนต้องตรวจก่อน
  // 🟢 พร้อมอนุมัติ = กดโอนแล้ว (paid_confirmed=true)
  // 🟡 ต้องตรวจ = ready_yellow (AI ไม่ชัด) — แก้ก่อน ค่อยไปรอโอน
  const yellow  = ROWS.filter(r=>r.status==='ready_yellow' && !r.paid_confirmed);
  const waiting = ROWS.filter(r=>r.status==='ready_green'  && !r.paid_confirmed);
  const ready   = ROWS.filter(r=>r.paid_confirmed===true);

  document.getElementById('cntWaiting').textContent=waiting.length;
  document.getElementById('cntReady').textContent=ready.length;
  document.getElementById('cntYellow').textContent=yellow.length;
  document.getElementById('waitingCount').textContent=waiting.length;
  document.getElementById('readyCount').textContent=ready.length;
  document.getElementById('yellowCount').textContent=yellow.length;

  // 🕐 รอโอน — ติ๊กเลือก → กด "โอนแล้ว" / แก้ไขได้
  const wb=document.getElementById('waitingBody');
  if(waiting.length===0){ wb.innerHTML='<div class="empty"><div class="big">🕐</div>ไม่มีรายการรอโอน</div>'; }
  else{
    wb.innerHTML='<div class="gtable">'+
      '<div class="grow head"><span><input type="checkbox" id="wAll" onclick="toggleAll(this,\'wchk\',\'btnPaid\')"></span><span>รายการ</span><span>หมวด</span><span>ยอด</span><span>ผู้จ่าย</span></div>'+
      waiting.map(r=>`<div class="grow">
        <span><input type="checkbox" class="wchk" value="${r.id}" onchange="updBtn('wchk','btnPaid','โอนแล้ว')"></span>
        <span>${esc(r.ai_description)}</span>
        <span><span class="cat">${esc(catLabel(r.ai_cat_id))}</span></span>
        <span class="amt">${fmt(r.ai_amount)} ฿</span>
        <span class="who">${esc(r.ai_paid_by)} <button class="edit-btn" onclick="openEdit(${r.id})" title="แก้ไข">✏️</button><button class="del-btn" onclick="rejectOne(${r.id})" title="ทิ้งรายการ">❌</button></span>
      </div>`).join('')+'</div>';
  }

  // 🟢 พร้อมอนุมัติ — โอนแล้ว → ติ๊กเลือก → อนุมัติ / แก้ไขได้
  const rb=document.getElementById('readyBody');
  if(ready.length===0){ rb.innerHTML='<div class="empty"><div class="big">✅</div>ยังไม่มีรายการที่ยืนยันโอนแล้ว</div>'; }
  else{
    rb.innerHTML='<div class="gtable">'+
      '<div class="grow head"><span><input type="checkbox" id="rAll" onclick="toggleAll(this,\'rchk\',\'btnApprove\')"></span><span>รายการ</span><span>หมวด</span><span>ยอด</span><span>ผู้จ่าย</span></div>'+
      ready.map(r=>`<div class="grow">
        <span><input type="checkbox" class="rchk" value="${r.id}" onchange="updBtn('rchk','btnApprove','อนุมัติที่เลือก')"></span>
        <span>${esc(r.ai_description)}</span>
        <span><span class="cat">${esc(catLabel(r.ai_cat_id))}</span></span>
        <span class="amt">${fmt(r.ai_amount)} ฿</span>
        <span class="who">${esc(r.ai_paid_by)} <button class="edit-btn" onclick="openEdit(${r.id})" title="แก้ไข">✏️</button><button class="del-btn" onclick="rejectOne(${r.id})" title="ทิ้งรายการ">❌</button></span>
      </div>`).join('')+'</div>';
  }

  // 🟡 ต้องตรวจ — แก้ฟิลด์ → กด "ตรวจแล้ว ส่งไปรอโอน"
  const yb=document.getElementById('yellowBody');
  if(yellow.length===0){ yb.innerHTML='<div class="empty"><div class="big">🟡</div>ไม่มีรายการที่ต้องตรวจ</div>'; }
  else{
    yb.innerHTML=yellow.map(r=>{
      const c=r.confidence||{};
      const lowAmt=(c.amount??1)<0.9?'low':'', lowCat=(c.cat??1)<0.8?'low':'', lowDesc=(c.description??1)<0.8?'low':'';
      return `<div class="ycard" data-id="${r.id}">
        <div class="raw">${esc(r.raw_text)}</div>
        <div class="yfields">
          <div class="yf ${lowDesc}"><label>รายการ</label><input id="d_${r.id}" value="${esc(r.ai_description)}"></div>
          <div class="yf ${lowAmt}"><label>ยอดเงิน (บาท)</label><input id="a_${r.id}" type="number" step="0.01" value="${r.ai_amount??''}"></div>
          <div class="yf ${lowCat}"><label>หมวด</label><select id="c_${r.id}">${catOptions(r.ai_cat_id)}</select></div>
          <div class="yf"><label>ผู้จ่าย</label><input id="p_${r.id}" value="${esc(r.ai_paid_by)}" readonly style="background:#f4f5f7"></div>
        </div>
        <div class="acts">
          <button class="btn btn-reject btn-sm" onclick="rejectOne(${r.id})">ไม่ใช่รายจ่าย</button>
          <button class="btn btn-approve btn-sm" onclick="reviewDone(${r.id})">ตรวจแล้ว → ส่งไปรอโอน</button>
        </div>
      </div>`;
    }).join('');
  }
}
function esc(s){ return (s??'').toString().replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function toggleAll(cb,cls,btnId){ document.querySelectorAll('.'+cls).forEach(c=>c.checked=cb.checked); updBtn(cls,btnId,btnId==='btnPaid'?'โอนแล้ว':'อนุมัติที่เลือก'); }
function updBtn(cls,btnId,label){
  const n=document.querySelectorAll('.'+cls+':checked').length;
  const b=document.getElementById(btnId);
  if(!b) return;
  b.disabled=n===0; b.textContent=n>0?`${label} (${n})`:label;
}

// ========== ACTIONS ==========
async function callApprove(payload){
  const r=await fetch(APPROVE_FN,{
    method:'POST',
    headers:{ 'Content-Type':'application/json', apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY },
    body:JSON.stringify(payload)
  });
  return r.json();
}
// อัปเดตธง paid_confirmed ตรงๆ ผ่าน REST (ไม่ต้องผ่าน edge function)
async function patchInbox(ids, patch){
  const idList='(' + ids.join(',') + ')';
  const r=await fetch(`${INBOX_URL}/rest/v1/expense_inbox?id=in.${idList}`,{
    method:'PATCH',
    headers:{ 'Content-Type':'application/json', apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY, Prefer:'return=minimal' },
    body:JSON.stringify(patch)
  });
  return r.ok;
}

// 🕐 "โอนแล้ว" — ยืนยันว่า Joy โอนเงินแล้ว (เลือกหลายรายการ)
async function confirmPaid(){
  const ids=[...document.querySelectorAll('.wchk:checked')].map(c=>+c.value);
  if(!ids.length) return;
  if(!confirm(`ยืนยันว่า Joy โอนเงินแล้ว ${ids.length} รายการ?`)) return;
  toast('กำลังยืนยัน...');
  const ok=await patchInbox(ids,{ paid_confirmed:true, paid_confirmed_at:new Date().toISOString(), paid_confirmed_by:CUR_USER });
  if(ok){ toast(`✅ ยืนยันโอนแล้ว ${ids.length} รายการ`); loadData(); }
  else toast('❌ ยืนยันไม่สำเร็จ');
}

// 🟢 อนุมัติ (เฉพาะที่โอนแล้ว) — เขียนลง tb_expenses
async function approveReady(){
  const ids=[...document.querySelectorAll('.rchk:checked')].map(c=>+c.value);
  if(!ids.length) return;
  if(!confirm(`อนุมัติ ${ids.length} รายการ เข้าระบบบัญชี?`)) return;
  toast('กำลังอนุมัติ...');
  const res=await callApprove({ action:'approve', ids, approved_by:CUR_USER });
  if(res.ok){ toast(`✅ อนุมัติ ${res.approved} รายการแล้ว`); loadData(); }
  else toast('❌ '+(res.error||'ผิดพลาด'));
}

// 🟡 "ตรวจแล้ว" — แก้ฟิลด์เสร็จ ส่งกลับไปโซนรอโอน (เปลี่ยนเป็นเขียว)
async function reviewDone(id){
  const desc=document.getElementById('d_'+id).value.trim();
  const amt=parseFloat(document.getElementById('a_'+id).value);
  const cat=document.getElementById('c_'+id).value;
  if(!amt||!desc){ toast('กรอกรายการและยอดเงินให้ครบ'); return; }
  if(!cat){ toast('เลือกหมวดก่อน'); return; }
  toast('กำลังบันทึก...');
  const ok=await patchInbox([id],{
    ai_description:desc, ai_amount:amt, ai_cat_id:cat,
    status:'ready_green', needs_review:false
  });
  if(ok){ toast('✅ ตรวจแล้ว ส่งไปรอโอน'); loadData(); }
  else toast('❌ บันทึกไม่สำเร็จ');
}

async function rejectOne(id){
  if(!confirm('ทิ้งรายการนี้ (ไม่ใช่รายจ่าย)?')) return;
  const res=await callApprove({ action:'reject', ids:[id], approved_by:CUR_USER });
  if(res.ok){ toast('ทิ้งรายการแล้ว'); loadData(); }
  else toast('❌ '+(res.error||'ผิดพลาด'));
}

// ✏️ แก้ไขรายการ (ใช้ได้ทุกโซน) — เผื่อ AI อ่านเลข/หมวดผิด
function openEdit(id){
  const r=ROWS.find(x=>x.id===id); if(!r) return;
  document.getElementById('editId').value=id;
  document.getElementById('editRaw').textContent=r.raw_text||'';
  document.getElementById('editDesc').value=r.ai_description||'';
  document.getElementById('editAmount').value=r.ai_amount??'';
  document.getElementById('editCat').innerHTML=catOptions(r.ai_cat_id);
  document.getElementById('editPaidBy').value=r.ai_paid_by||'';
  document.getElementById('editDate').value=r.ai_date||'';
  document.getElementById('editModal').classList.add('show');
}
function closeEdit(){ document.getElementById('editModal').classList.remove('show'); }
async function saveEdit(){
  const id=+document.getElementById('editId').value;
  const desc=document.getElementById('editDesc').value.trim();
  const amt=parseFloat(document.getElementById('editAmount').value);
  const cat=document.getElementById('editCat').value;
  const paidBy=document.getElementById('editPaidBy').value.trim();
  const date=document.getElementById('editDate').value;
  if(!desc||!amt){ toast('กรอกรายการและยอดเงินให้ครบ'); return; }
  if(!cat){ toast('เลือกหมวดก่อน'); return; }
  toast('กำลังบันทึก...');
  const ok=await patchInbox([id],{
    ai_description:desc, ai_amount:amt, ai_cat_id:cat, ai_paid_by:paidBy, ai_date:date
  });
  if(ok){ toast('✅ บันทึกแล้ว'); closeEdit(); loadData(); }
  else toast('❌ บันทึกไม่สำเร็จ');
}

// ========== RECURRING EXPENSES ==========
let REC=[];
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function switchView(v){
  if(v==='recurring' && CUR_ROLE!=='owner'){ return; }  // เฉพาะ owner
  const ap = v==='approve';
  document.getElementById('viewApprove').style.display = ap?'block':'none';
  document.getElementById('viewRecurring').style.display = ap?'none':'block';
  document.getElementById('tabApprove').classList.toggle('active', ap);
  document.getElementById('tabRecurring').classList.toggle('active', !ap);
  if(!ap) loadRecurring();
}

async function loadRecurring(){
  if(!CATS.length) await loadCats();
  try{
    const r = await fetch(`${INBOX_URL}/rest/v1/recurring_expenses?order=day_of_month,description&select=*`,
      { headers:{ apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY }});
    REC = await r.json();
  }catch(e){ REC=[]; }
  renderRecurring();
}

function renderRecurring(){
  const body=document.getElementById('recBody');
  const active=REC.filter(x=>x.active);
  const total=active.reduce((s,x)=>s+Number(x.amount||0),0);
  document.getElementById('recTotal').innerHTML =
    'รวมที่เปิดใช้งาน <b>'+total.toLocaleString('th-TH')+'</b> บาท/เดือน · '+active.length+' รายการ';
  if(!REC.length){
    body.innerHTML='<div class="empty"><div class="big">📋</div>ยังไม่มีรายจ่ายประจำ — กด “➕ เพิ่มรายการ” เพื่อเริ่ม</div>';
    return;
  }
  let h='<div class="rtable"><div class="rrow head"><div>รายการ</div><div>หมวด</div><div>วันจ่าย</div><div>ธนาคาร</div><div style="text-align:right">ยอด</div><div style="text-align:center">เปิด/แก้/ลบ</div></div>';
  REC.forEach(x=>{
    h+=`<div class="rrow ${x.active?'':'off'}">
      <div><b>${esc(x.description)}</b></div>
      <div><span class="cat">${esc(x.cat_label||'-')}</span></div>
      <div><span class="day">${x.day_of_month}</span></div>
      <div class="bank">${esc(x.bank||'-')}</div>
      <div class="amt" style="text-align:right">${Number(x.amount).toLocaleString('th-TH')} ฿</div>
      <div class="racts">
        <label class="tgl"><input type="checkbox" ${x.active?'checked':''} onchange="toggleRec(${x.id},this.checked)"><span class="sl"></span></label>
        <button class="edit-btn" onclick="openRec(${x.id})" title="แก้ไข">✏️</button>
        <button class="del-btn" onclick="delRec(${x.id})" title="ลบ">🗑️</button>
      </div>
    </div>`;
  });
  h+='</div>';
  body.innerHTML=h;
}

function fillCatSelect(sel, chosen){
  sel.innerHTML='<option value="">— เลือกหมวด —</option>'+
    CATS.map(c=>`<option value="${esc(c.id)}" ${c.id===chosen?'selected':''}>${esc(c.label)}</option>`).join('');
}
function openRec(id){
  const x = id ? REC.find(r=>r.id===id) : null;
  document.getElementById('recModalTitle').textContent = x?'แก้ไขรายจ่ายประจำ':'เพิ่มรายจ่ายประจำ';
  document.getElementById('recId').value    = x?x.id:'';
  document.getElementById('recDesc').value  = x?x.description:'';
  document.getElementById('recAmount').value= x?x.amount:'';
  document.getElementById('recDay').value   = x?x.day_of_month:'';
  fillCatSelect(document.getElementById('recCat'), x?x.cat_id:'');
  document.getElementById('recBank').value  = (x&&x.bank)?x.bank:'';
  document.getElementById('recActive').checked = x?!!x.active:true;
  document.getElementById('recModal').classList.add('show');
}
function closeRec(){ document.getElementById('recModal').classList.remove('show'); }

async function saveRec(){
  const id=document.getElementById('recId').value;
  const desc=document.getElementById('recDesc').value.trim();
  const amount=parseFloat(document.getElementById('recAmount').value);
  const day=parseInt(document.getElementById('recDay').value);
  const catSel=document.getElementById('recCat');
  const cat_id=catSel.value;
  const cat_label=catSel.options[catSel.selectedIndex]?catSel.options[catSel.selectedIndex].text:'';
  const bank=document.getElementById('recBank').value.trim()||null;
  const active=document.getElementById('recActive').checked;
  if(!desc){ toast('กรอกชื่อรายการ'); return; }
  if(!amount||amount<=0){ toast('กรอกยอดเงินให้ถูกต้อง'); return; }
  if(!day||day<1||day>31){ toast('วันที่จ่ายต้องอยู่ระหว่าง 1-31'); return; }
  if(!cat_id){ toast('เลือกหมวดก่อน'); return; }
  const payload={ description:desc, amount, day_of_month:day, cat_id, cat_label, bank, active };
  const base={ 'Content-Type':'application/json', apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY, Prefer:'return=minimal' };
  let r;
  if(id){
    r=await fetch(`${INBOX_URL}/rest/v1/recurring_expenses?id=eq.${id}`,{ method:'PATCH', headers:base, body:JSON.stringify(payload) });
  } else {
    r=await fetch(`${INBOX_URL}/rest/v1/recurring_expenses`,{ method:'POST', headers:base, body:JSON.stringify(payload) });
  }
  if(r.ok){ toast('✅ บันทึกแล้ว'); closeRec(); loadRecurring(); }
  else toast('❌ บันทึกไม่สำเร็จ');
}

async function toggleRec(id, active){
  const r=await fetch(`${INBOX_URL}/rest/v1/recurring_expenses?id=eq.${id}`,{
    method:'PATCH',
    headers:{ 'Content-Type':'application/json', apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY, Prefer:'return=minimal' },
    body:JSON.stringify({ active })
  });
  if(r.ok){ const x=REC.find(r=>r.id===id); if(x)x.active=active; renderRecurring(); toast(active?'เปิดใช้งานแล้ว':'ปิดชั่วคราวแล้ว'); }
  else { toast('❌ อัปเดตไม่สำเร็จ'); loadRecurring(); }
}

async function delRec(id){
  const x=REC.find(r=>r.id===id);
  if(!confirm('ลบรายจ่ายประจำ "'+(x?x.description:'')+'" ออกถาวร?')) return;
  const r=await fetch(`${INBOX_URL}/rest/v1/recurring_expenses?id=eq.${id}`,{
    method:'DELETE',
    headers:{ apikey:INBOX_KEY, Authorization:'Bearer '+INBOX_KEY, Prefer:'return=minimal' }
  });
  if(r.ok){ toast('ลบแล้ว'); loadRecurring(); }
  else toast('❌ ลบไม่สำเร็จ');
}

let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

// ========== INIT ==========
populateUsers();
const saved=sessionStorage.getItem('exp_user');
if(saved){
  CUR_USER=saved;
  CUR_ROLE=sessionStorage.getItem('exp_role')||'staff';
  applyRole();
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('whoami').textContent='👤 '+saved;
  loadData();
}
</script>
